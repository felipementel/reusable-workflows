name: Sandbox API Dispatch ⚡
run-name: "${{ github.actor }} - ${{ github.run_id }}"

#Secrets on Caller: GITLEAKS_LICENSE, SNYK_TOKEN, SONAR_TOKEN, SONAR_PROJECT_KEY
#VARS on Caller: SONAR_ORGANIZATION
on:
  workflow_call:
    inputs:
      buildMode:
        description: "Qual ação deseja fazer?"
        required: true
        default: 'Build'
        type: string
      environment:
        type: string
        description: 'Environment to run the workflow'
        required: true
        default: 'DEV'
      gitLeaks:
        type: boolean
        description: 'Run GitLeaks'
        required: true
        default: true
      sonarQube:
        type: boolean
        description: 'Run SonarQube'
        required: true
        default: true
      testsFolder:
        type: string
        description: 'The main test folder'
        required: false
        default: ''
      tests:
        type: boolean
        description: 'Run Unit & Integration Tests'
        required: true
        default: false
      snyk:
        type: boolean
        description: 'Snyk.io'
        required: true
        default: true
      msgCanalDeploy:
        type: string
        description: 'Message to be displayed in the summary'
        required: true
        default: 'Canal DEPLOY - O melhor canal sobre .NET, Azure, DevOps e IA'
      #build config
      dotnetVersion:
        type: string
        description: '.NET Version'
        required: true
        default: 9.x
      projectBaseDir:
        type: string
        description: 'Path to SLNX file'
        required: true
        default: ./src
      solutionFileName:
        type: string
        description: 'The SLNX or SLN full name. eg: DEPLOY.PROJECT.API.slnx'
        required: true
        default: ""
      mainProject:
        type: string
        description: 'The main project. eg: DEPLOY.PROJECT.API'
        required: true
        default: ""
      reportTitle:
        type: string
        description: 'Message to be displayed in the unit test report title'
        required: true
        default: 'Canal DEPLOY'
      #build use
      sonarExclusions:
        type: string
        description: 'Path to exclusion from sonar, like migrations. Use comma separation'
        required: true
        default: ""
      #push-image
      imageName:
        type: string
        description: 'Image name to publish at github packages'
        required: true
        default: ""
      openAPIFolder:
        type: string
        description: 'Path to the folder containing OpenAPI specification files. This folder should include all necessary YAML or JSON files for API documentation.'
        required: true
        default: ""
    secrets:
      SONAR_PROJECT_KEY:
        required: true
        description: 'Sonar Project Key'
      GITLEAKS_LICENSE:
        required: true
        description: 'Gitleaks License'
      SNYK_TOKEN:
        required: true
        description: 'Snyk Token'
      SONAR_TOKEN:
        required: true
        description: 'Sonar Token'
env:
  RED: '\033[0;31m'
  GREEN: '\033[0;32m'
  YELLOW: '\033[0;33m'
  BLUE: '\033[0;34m'
  RESET: '\033[0m'
  BOLD: '\033[1m'
  UNDERLINE: '\033[4m'
  BOLD_UNDERLINE: '\033[1;4m'
  BOLD_RED: '\033[1;31m'
  BOLD_GREEN: '\033[1;32m'
  BOLD_YELLOW: '\033[1;33m'
  BOLD_BLUE: '\033[1;34m'

  javaVersion: 23
  javaDistro: zulu
  nodeVersion: 22

jobs:
  build:
    name: Build
    environment: ${{ inputs.environment }}
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}
      cancel-in-progress: true
    outputs:
      tag-version: ${{ steps.get-version.outputs.TAG }}
      now: ${{ steps.get-env.outputs.NOW }}
      image-exists: ${{ steps.check-image-and-tag.outputs.IMAGE_EXISTS }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      security-events: write

    steps:
      - name: 🧭 Get Environment
        id: get-env
        run: |
          echo -e "${GREEN} ⚠️ Environment ${{ inputs.environment }}"
          echo "NOW=$(date +'%Y-%m-%dT%H:%M:%S')" >> $GITHUB_OUTPUT

      - name: 📥 Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.ref }}
          sparse-checkout: |
            src
            tests
          sparse-checkout-cone-mode: false

      - name: 🔍 Get-Version from csproj
        id: get-version
        uses: felipementel/reusable-workflows/.github/actions/dotnet-get-version@main
        with:
          projectBaseDir: ${{ inputs.projectBaseDir }}
          mainProject: ${{ inputs.mainProject }}

      - name: 🛠️ Setup .NET version ${{ inputs.dotnetVersion }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ inputs.dotnetVersion }}

      - name: ✅ Check .NET version in use
        run: |
          echo "DOTNET_ROOT: $DOTNET_ROOT"
          $DOTNET_ROOT/dotnet --info

      - name: 🧪 Dotnet Test & Coverage
        id: dotnet-test
        if: ${{ inputs.tests }}
        uses: felipementel/reusable-workflows/.github/actions/dotnet-test@main
        with:
          testsFolder: ${{ inputs.testsFolder }}
          reportTitle: ${{ inputs.reportTitle }}
          sonarExclusions: ${{ inputs.sonarExclusions }}
          run-number: ${{ github.run_number }}
          run-id: ${{ github.run_id }}

      - name: 🧱📤 Git Leaks
        if: ${{ inputs.gitLeaks }}
        uses: felipementel/reusable-workflows/.github/actions/git-leaks@main
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          gitleaks-license: ${{ secrets.GITLEAKS_LICENSE }}

      - name: � SonarCloud Analysis
        if: ${{ inputs.sonarQube }}
        uses: felipementel/reusable-workflows/.github/actions/sonar-cloud@main
        with:
          has-tests: ${{ steps.dotnet-test.outputs.has-tests }}
          sonar-project-key: ${{ secrets.SONAR_PROJECT_KEY }}
          sonar-organization: ${{ vars.SONAR_ORGANIZATION }}
          sonar-token: ${{ secrets.SONAR_TOKEN }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          sonar-exclusions: ${{ inputs.sonarExclusions }}
          projectBaseDir: ${{ inputs.projectBaseDir }}
          mainProject: ${{ inputs.mainProject }}
          solutionFileName: ${{ inputs.solutionFileName }}
          java-version: ${{ env.javaVersion }}
          java-distro: ${{ env.javaDistro }}

      - name: 🍵 Snyk Security Scan
        if: ${{ inputs.snyk }}
        uses: felipementel/reusable-workflows/.github/actions/tools-snyk@main
        with:
          snyk-token: ${{ secrets.SNYK_TOKEN }}
          projectBaseDir: ${{ inputs.projectBaseDir }}
          mainProject: ${{ inputs.mainProject }}
          solutionFileName: ${{ inputs.solutionFileName }}
          imageName: ${{ inputs.imageName }}

      - name: �️ Spectral OpenAPI Lint
        if: ${{ inputs.openAPIFolder != '' }}
        uses: felipementel/reusable-workflows/.github/actions/tools-spectral@main
        with:
          openAPIFolder: ${{ inputs.openAPIFolder }}
          node-version: ${{ env.nodeVersion }}
          projectBaseDir: ${{ inputs.projectBaseDir }}
          mainProject: ${{ inputs.mainProject }}
          needs-build: ${{ (!inputs.snyk && inputs.openAPIFolder != '') && 'true' || 'false' }}

      - name: 🧾 Write to workflow job summary
        run: |
          SUMMARY=$GITHUB_STEP_SUMMARY$'
          # Versão gerada\n
          | versao | data | 
          |--|--|
          | ${{ steps.get-version.outputs.tag }} | ${{ steps.get-env.outputs.now }} | \n
          Mensagem: ${{ inputs.msgCanalDeploy }}\n'
          echo "$SUMMARY" >> $GITHUB_STEP_SUMMARY

  check-image:
    name: Check if image exists
    if: ${{ inputs.buildMode == 'Build + Tag Validation' }}
    environment: ${{ inputs.environment }}
    runs-on: ubuntu-latest
    outputs:
      image-exists: ${{ steps.check-image-and-tag.outputs.IMAGE_EXISTS }}
    needs: build
    steps:
      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Check if image with same tag exists
        id: check-image-and-tag
        run: |
          IMAGE_TAG="ghcr.io/${{ github.actor }}/deploy.${{ inputs.imageName }}:${{ needs.build.outputs.tag-version }}"
          echo "Checking existence of $IMAGE_TAG..."
          if docker manifest inspect "$IMAGE_TAG" > /dev/null 2>&1; then
            echo -e "✅ ${GREEN} Image exists in registry"
            echo "IMAGE_EXISTS=true" >> "$GITHUB_OUTPUT"
          else
            echo -e "🔍 ${RED} Image does not exist in registry"
            echo "IMAGE_EXISTS=false" >> "$GITHUB_OUTPUT"
          fi

  push-image:
    name: Push image to Registry
    if: ${{ inputs.buildMode == 'Build + Tag Validation' && needs.check-image.outputs.image-exists == 'false' }}
    environment: ${{ inputs.environment }}
    # if: ${{ github.event.pull_request.merged && github.event.pull_request.state == 'closed' }}
    needs: [build, check-image]
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          sparse-checkout: |
            src
          sparse-checkout-cone-mode: false

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          version: latest
          buildkitd-flags: --debug
          platforms: linux/amd64,linux/arm64

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ghcr.io/${{ github.actor }}/deploy.${{ inputs.imageName }}

      - name: Build and push ghcr
        uses: docker/build-push-action@v5
        with:
          context: ${{ inputs.projectBaseDir }}
          file: ${{ inputs.projectBaseDir }}/${{ inputs.mainProject }}/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.actor }}/deploy.${{ inputs.imageName }}:latest
            ghcr.io/${{ github.actor }}/deploy.${{ inputs.imageName }}:${{ needs.build.outputs.tag-version }}
          labels: |
            ${{ steps.meta.outputs.labels }}

      - name: Write to workflow job summary DEPLOY
        run: |
          SUMMARY=$'
          # Image publicada\n
          | versao | data | 
          |--|--|
          | ${{ needs.build.outputs.tag-version }} | ${{ needs.build.outputs.now }} | \n
          Mensagem: ${{ inputs.msgCanalDeploy }}\n'
          echo "$SUMMARY" >> $GITHUB_STEP_SUMMARY

  publish:
    name: Publish
    if: ${{ inputs.buildMode == 'Build + Tag Validation' }}
    needs: [push-image]
    environment: ${{ inputs.environment }}
    # if: ${{ github.event.pull_request.merged && github.event.pull_request.state == 'closed' }}
    runs-on: ubuntu-latest
    steps:
      - name: Write to workflow job summary DEPLOY
        run: |
          SUMMARY=$'
          # Detalhes sobre publicação\n
          | versao | data | 
          |--|--|
          | ${{ needs.build.outputs.tag-version }} | ${{ needs.build.outputs.now }} | \n
          Mensagem: ${{ inputs.msgCanalDeploy }}\n'
          echo "$SUMMARY" >> $GITHUB_STEP_SUMMARY

  notify-image-exists:
    name: Notify when already image exists
    if: ${{ inputs.buildMode == 'Build + Tag Validation' && needs.check-image.outputs.image-exists == 'true'}}
    needs: [build, check-image]
    environment: ${{ inputs.environment }}
    runs-on: ubuntu-latest
    steps:
      - name: Write to workflow job summary
        run: |
          echo "Image with tag ${{ needs.build.outputs.tag-version }} already exists. Skipping push image to registry and publish on Azure Cloud." >> $GITHUB_STEP_SUMMARY
