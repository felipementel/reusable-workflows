name: React Web Deploy to Azure Static Web Apps ☁️
run-name: "${{ github.actor }} - ${{ inputs.environment }} - ${{ github.run_id }}"

on:
  workflow_call:
    inputs:
      environment:
        description: 'Deployment environment (DEV, HML, PRD)'
        required: false
        type: string
        default: 'DEV'
      appName:
        description: 'Application name (from build output, used in ZAP artifact name)'
        required: true
        type: string
      nodeVersion:
        description: 'Node.js version (used for the badge update)'
        required: false
        type: string
        default: '24.x'
      workingDirectory:
        description: 'Working directory where package.json is located (used for the badge update)'
        required: false
        type: string
        default: './source'
      appLocation:
        description: 'App location for Azure Static Web Apps (folder with built assets)'
        required: false
        type: string
        default: './dist'
      apiLocation:
        description: 'API location for Azure Static Web Apps'
        required: false
        type: string
        default: ''
      outputLocation:
        description: 'Output location for Azure Static Web Apps'
        required: false
        type: string
        default: ''
      url:
        description: 'The URL of the application to scan with OWASP ZAP (e.g. https://example.com)'
        required: true
        type: string
        default: ''
      allowIssueWriting:
        description: 'Allow writing issues to the ZAP report (true/false)'
        required: false
        type: boolean
        default: false
      failAction:
        description: 'Fail the action if ZAP finds vulnerabilities (true/false)'
        required: false
        type: boolean
        default: false
      cmdOptions:
        description: 'Additional command options for the ZAP baseline scan'
        required: false
        type: string
        default: '-a'
    secrets:
      AZURE_CREDENTIALS:
        required: true
        description: 'Azure Service Principal credentials JSON (output of az ad sp create-for-rbac)'
      AZURE_STATIC_WEB_APPS_API_TOKEN:
        required: true
        description: 'Deployment token for Azure Static Web Apps'
      BADGE_GIST_TOKEN:
        required: false
        description: 'Gist token for CI/CD badge update'

env:
  # Colors for output
  RED: '\033[0;31m'
  GREEN: '\033[0;32m'
  YELLOW: '\033[0;33m'
  BLUE: '\033[0;34m'
  RESET: '\033[0m'
  BOLD: '\033[1m'

  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  deploy:
    name: Deploy to Azure Static Web Apps
    runs-on: self-hosted
    timeout-minutes: 20
    environment: ${{ inputs.environment }}
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v8
        with:
          name: static-website
          path: ./dist

      - name: 🔐 Azure CLI Login
        uses: azure/login@v3
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
          enable-AzPSSession: false
          allow-no-subscriptions: true

      - name: 🧩 Generate dist/config.json from Azure SWA App Settings
        shell: bash
        env:
          AZURE_STATIC_WEBAPP_NAME: ${{ vars.AZURE_STATIC_WEBAPP_NAME }}
          AZURE_RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP }}
        run: |
          set -euo pipefail

          CONFIG_PATH="./dist/config.json"
          if [ ! -f "$CONFIG_PATH" ]; then
            echo -e "${YELLOW} ℹ️ No dist/config.json found; skipping runtime config injection."
            exit 0
          fi

          if ! grep -q '{{' "$CONFIG_PATH"; then
            echo -e "${GREEN} ✅ dist/config.json has no placeholders; nothing to inject."
            exit 0
          fi

          if [ -z "${AZURE_STATIC_WEBAPP_NAME:-}" ] || [ -z "${AZURE_RESOURCE_GROUP:-}" ]; then
            echo -e "${RED} ❌ dist/config.json still has placeholders, but AZURE_STATIC_WEBAPP_NAME/AZURE_RESOURCE_GROUP are not set as GitHub Environment variables."
            echo -e "${YELLOW} ➡️ Define vars.AZURE_STATIC_WEBAPP_NAME and vars.AZURE_RESOURCE_GROUP in the GitHub Environment used by this deployment (DEV/HML/PRD)."
            exit 1
          fi

          echo -e "${BLUE} 🔄 Fetching app settings from Azure Static Web App '$AZURE_STATIC_WEBAPP_NAME' in RG '$AZURE_RESOURCE_GROUP'..."
          az staticwebapp appsettings list \
            -n "$AZURE_STATIC_WEBAPP_NAME" \
            -g "$AZURE_RESOURCE_GROUP" \
            -o json > ./swa-appsettings.json

          node - <<'NODE'
          const fs = require('fs');

          const configPath = './dist/config.json';
          const template = JSON.parse(fs.readFileSync(configPath, 'utf8'));
          const settingsRaw = JSON.parse(fs.readFileSync('./swa-appsettings.json', 'utf8'));
          const settings = settingsRaw?.properties ?? settingsRaw;

          const requiredKeys = Object.keys(template);
          const missing = [];
          const output = {};

          for (const key of requiredKeys) {
            const value = settings?.[key];
            if (typeof value !== 'string' || value.trim() === '') {
              missing.push(key);
              continue;
            }
            output[key] = value;
          }

          if (missing.length) {
            console.error('❌ Missing required Azure SWA app settings:', missing.join(', '));
            process.exit(1);
          }

          fs.writeFileSync(configPath, JSON.stringify(output, null, 2));
          console.log('✅ Wrote runtime config to', configPath);
          NODE

      - name: 🚀 Deploy to Azure Static Web Apps
        id: swa-deploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: ${{ inputs.appLocation }}
          # api_location: ${{ inputs.apiLocation }}
          output_location: ${{ inputs.outputLocation }}
          skip_app_build: true

      # DAST/passive scan no site publicado
      - name: 🕷️ OWASP ZAP Baseline
        uses: GreenNexus-Core/gh-actions/.github/actions/owasp-zap@main
        with:
          url: ${{ inputs.url }}
          allow_issue_writing: ${{ inputs.allowIssueWriting }}
          fail_action: ${{ inputs.failAction }}
          cmd_options: ${{ inputs.cmdOptions }}
          artifact_name: zap-baseline-report-${{ inputs.environment }}-${{ inputs.appName }}

      - name: Deploy Summary
        run: |
          echo "## 🚀 Deploy Completed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Environment** | \`${{ inputs.environment }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Branch** | \`${{ github.ref_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Commit** | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- 🌍 Site publicado: ${{ steps.swa-deploy.outputs.static_web_app_url }}" >> $GITHUB_STEP_SUMMARY
