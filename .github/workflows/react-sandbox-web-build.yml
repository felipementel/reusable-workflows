name: React Web Build ⚛️
run-name: "${{ github.actor }} - ${{ inputs.environment }} - ${{ github.run_id }}"

on:
  workflow_call:
    inputs:
      environment:
        description: 'Environment to build for (DEV, HML, PRD)'
        required: false
        type: string
        default: 'DEV'
      nodeVersion:
        description: 'Node.js version to use'
        required: false
        type: string
        default: '24.x'
      workingDirectory:
        description: 'Working directory where package.json is located'
        required: false
        type: string
        default: './source'
      sparseCheckout:
        description: 'Sparse checkout pattern'
        required: false
        type: string
        default: 'source/'
      sonarExclusions:
        description: 'Paths to exclude from SonarCloud analysis (comma separated)'
        required: false
        type: string
        default: ''
    secrets:
      GITLEAKS_LICENSE:
        required: true
        description: 'Gitleaks License'
      BADGE_GIST_TOKEN:
        required: false
        description: 'Gist token for CI/CD badge update'
      APPLICATIONINSIGHTS_CONNECTION_STRING:
        required: false
        description: 'Application Insights connection string for .env injection'
      VITE_AUTH_API_KEY:
        required: false
        description: 'Auth API Key for Data Processor .env injection'
      SONAR_TOKEN:
        required: false
        description: 'SonarCloud token'
      SONAR_PROJECT_KEY:
        required: false
        description: 'SonarCloud project key'
    outputs:
      tag-version:
        description: 'The version tag extracted from package.json'
        value: ${{ jobs.build-and-test.outputs.tag-version }}
      app-name:
        description: 'The application name extracted from package.json'
        value: ${{ jobs.build-and-test.outputs.app-name }}

env:
  # Colors for output
  RED: '\033[0;31m'
  GREEN: '\033[0;32m'
  YELLOW: '\033[0;33m'
  BLUE: '\033[0;34m'
  RESET: '\033[0m'
  BOLD: '\033[1m'
  BOLD_GREEN: '\033[1;32m'
  BOLD_YELLOW: '\033[1;33m'

  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build-and-test:
    name: Build and Test React Web
    environment: ${{ inputs.environment }}
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}
      cancel-in-progress: true
    runs-on: self-hosted
    outputs:
      tag-version: ${{ steps.get-package-data.outputs.TAG }}
      app-name: ${{ steps.get-package-data.outputs.APP_NAME }}
    timeout-minutes: 10
    permissions:
      contents: write
      security-events: write

    steps:
      - name: Checkout
        uses: felipementel/reusable-workflows/.github/actions/_wrapper/github/checkout@main
        with:
          ref: ${{ github.ref }}
          fetch-depth: 0
          sparse-checkout: |
            ${{ inputs.sparseCheckout }}
          sparse-checkout-cone-mode: false

      - name: 🏷️ Set Badge to Running
        if: ${{ github.ref == 'refs/heads/main' }}
        uses: felipementel/gh-actions/.github/actions/update-badge-gist@main
        with:
          gist_id: ${{ vars.BADGE_GIST_ID }}
          gist_token: ${{ secrets.BADGE_GIST_TOKEN }}
          badge_type: cicd
          build_status: running

      - name: 🧱📤 Git Leaks
        if: ${{ !(github.event_name == 'pull_request' && github.actor == 'dependabot[bot]') }}
        uses: felipementel/gh-actions/.github/actions/git-leaks@main
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          gitleaks-license: ${{ secrets.GITLEAKS_LICENSE }}
          enable-summary: 'true'
          enable-upload-artifact: 'true'
          notify-user-list: '@felipementel'

      # Trivy no source/repo SAST scan (vulnerabilities, secrets, misconfigurations)
      - name: 🔎 Trivy - filesystem scan (deps, misconfig, secrets)
        uses: felipementel/gh-actions/.github/actions/trivy-scan@main
        with:
          scan-type: 'fs'
          scan-ref: '${{ env.working_directory }}/dist'
          scanners: 'vuln,misconfig,secret'
          format: 'github'
          severity: 'MEDIUM,HIGH,CRITICAL'
          ignore-unfixed: true
          exit-code: '1'
          trivyignores: ${{ steps.check-trivyignore.outputs.path }}

      - name: 🔎 Trivy - license scan
        uses: felipementel/gh-actions/.github/actions/trivy-scan@main
        with:
          scan-type: 'fs'
          scan-ref: '${{ env.working_directory }}'
          scanners: 'license'
          format: 'table'
          severity: 'MEDIUM,HIGH,CRITICAL'
          ignore-unfixed: true
          exit-code: '1'
          trivyignores: ${{ steps.check-trivyignore.outputs.path }}

      - name: 🏷️ Extract Application Version
        uses: felipementel/gh-actions/.github/actions/react-get-package-data@main
        id: get-package-data
        with:
          environment: ${{ inputs.environment }}
          working_directory: ${{ inputs.workingDirectory }}

      - name: Setup Node ${{ inputs.nodeVersion }} (with npm cache)
        uses: felipementel/reusable-workflows/.github/actions/_wrapper/github/setup-node@main
        with:
          node-version: ${{ inputs.nodeVersion }}
          cache: 'npm'
          cache-dependency-path: '${{ inputs.workingDirectory }}/package-lock.json'

      - name: Show npm version
        run: npm --version
        working-directory: ${{ inputs.workingDirectory }}

      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then
            echo -e "✅${GREEN} package-lock.json encontrado: usando ci"
            npm ci
          else
            echo -e "⚠️${YELLOW} package-lock.json ausente: usando install"
            npm install
          fi
        working-directory: ${{ inputs.workingDirectory }}

      - name: 🔍 npm audit (dependency vulnerabilities)
        run: |
          echo "🔍 Checking for known vulnerabilities in dependencies..."
          npm audit --audit-level=high || echo -e "⚠️${YELLOW} npm audit found vulnerabilities (non-blocking)"
        working-directory: ${{ inputs.workingDirectory }}

      - name: Run ESLint
        run: npm run lint || echo -e "⚠️${YELLOW} ESLint warnings (não bloqueou)"
        working-directory: ${{ inputs.workingDirectory }}

      - name: Check formatting (Prettier)
        run: npx prettier --check "src/**/*.{ts,tsx,js,jsx,css}" || echo -e "⚠️${YELLOW} Prettier encontrou arquivos não formatados"
        working-directory: ${{ inputs.workingDirectory }}

      # ENV para o Data Processor
      - name: Create .env for Data Processor
        if: github.repository == 'felipementelgn-web-data-processor'
        uses: felipementel/gh-actions/.github/actions/react-env-data-processor@main
        env:
          VITE_ADMIN_API_URL: ${{ vars.VITE_ADMIN_API_URL }}
          VITE_AUTH_API_URL: ${{ vars.VITE_AUTH_API_URL }}
          VITE_AUTH_API_KEY: ${{ secrets.VITE_AUTH_API_KEY }}
          VITE_INGEST_SHP_API_URL: ${{ vars.VITE_INGEST_SHP_API_URL }}
          VITE_CAR_DP_API_URL: ${{ vars.VITE_CAR_DP_API_URL }}
          VITE_SNCR_DP_API_URL: ${{ vars.VITE_SNCR_DP_API_URL }}
          VITE_CAFIR_DP_API_URL: ${{ vars.VITE_CAFIR_DP_API_URL }}
          VITE_TILES_DP_API_URL: ${{ vars.VITE_TILES_DP_API_URL }}
          VITE_ANALYTICS_DP_API_URL: ${{ vars.VITE_ANALYTICS_DP_API_URL }}
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}
          VITE_ORCHESTRATOR_API_URL: ${{ vars.VITE_ORCHESTRATOR_API_URL }}
          VITE_APPLICATION_ID: ${{ vars.VITE_APPLICATION_ID }}
          VITE_APPLICATIONINSIGHTS_CONNECTION_STRING: ${{ secrets.APPLICATIONINSIGHTS_CONNECTION_STRING }}
        with:
          working_directory: ${{ inputs.workingDirectory }}
          environment: ${{ inputs.environment }}

      # ENV para o Admin Plataforma
      - name: Create .env for Admin Plataforma
        if: github.repository == 'felipementelgn-web-admin-plataforma'
        uses: felipementel/gh-actions/.github/actions/react-env-admin-plataforma@main
        env:
          VITE_API_AUTH_URL: ${{ vars.VITE_API_AUTH_URL }}
          VITE_API_PROPERTY_URL: ${{ vars.VITE_API_PROPERTY_URL }}
          VITE_DEBUG: ${{ vars.VITE_DEBUG }}
          VITE_APPLICATIONINSIGHTS_CONNECTION_STRING: ${{ secrets.APPLICATIONINSIGHTS_CONNECTION_STRING }}
        with:
          working_directory: ${{ inputs.workingDirectory }}
          environment: ${{ inputs.environment }}

      # ENV para o Slider
      - name: Create .env for Slider
        if: github.repository == 'felipementelgn-web-slider'
        uses: felipementel/gh-actions/.github/actions/react-env-slider@main
        env:
          VITE_IMGS_BASE_URL: ${{ vars.VITE_IMGS_BASE_URL }}
          AZURE_IMGS_CONTAINER_URL: ${{ vars.AZURE_IMGS_CONTAINER_URL }}
          VITE_APPLICATIONINSIGHTS_CONNECTION_STRING: ${{ secrets.APPLICATIONINSIGHTS_CONNECTION_STRING }}
        with:
          working_directory: ${{ inputs.workingDirectory }}
          environment: ${{ inputs.environment }}

      # ENV para o Plataforma (principal)
      - name: Create .env for Plataforma
        if: github.repository == 'felipementelgn-web-plataforma'
        uses: felipementel/gh-actions/.github/actions/react-env-plataforma@main
        env:
          VITE_API_URL: ${{ vars.VITE_API_URL }}
          VITE_PROPERTY_SERVICE_URL: ${{ vars.VITE_PROPERTY_SERVICE_URL }}
          VITE_AUTH_SERVICE_URL: ${{ vars.VITE_AUTH_SERVICE_URL }}
          VITE_GEOSPATIAL_SERVICE_URL: ${{ vars.VITE_GEOSPATIAL_SERVICE_URL }}
          VITE_API_GEO_SERVICES_URL: ${{ vars.VITE_API_GEO_SERVICES_URL }}
          VITE_API_HUB_SERVICES_URL: ${{ vars.VITE_API_HUB_SERVICES_URL }}
          VITE_MUNICIPALITIES_SERVICE_URL: ${{ vars.VITE_MUNICIPALITIES_SERVICE_URL }}
          VITE_EMAIL_SERVICE_URL: ${{ vars.VITE_EMAIL_SERVICE_URL }}
          VITE_HUB_SERVICE_URL: ${{ vars.VITE_HUB_SERVICE_URL }}
          VITE_SSE_SERVICE_URL: ${{ vars.VITE_SSE_SERVICE_URL }}
          VITE_TILES_SERVICE_URL: ${{ vars.VITE_TILES_SERVICE_URL }}
          VITE_TILE_BASE_URL: ${{ vars.VITE_TILE_BASE_URL }}
          VITE_TILE_VERSION: ${{ vars.VITE_TILE_VERSION }}
          VITE_TILE_PROVIDER: ${{ vars.VITE_TILE_PROVIDER }}
          VITE_TILE_SAS: ${{ vars.VITE_TILE_SAS }}
          VITE_CORS_ENABLED: ${{ vars.VITE_CORS_ENABLED }}
          VITE_CORS_ORIGINS: ${{ vars.VITE_CORS_ORIGINS }}
          VITE_CORS_METHODS: ${{ vars.VITE_CORS_METHODS }}
          VITE_CORS_ALLOWED_HEADERS: ${{ vars.VITE_CORS_ALLOWED_HEADERS }}
          VITE_DEBUG: ${{ vars.VITE_DEBUG }}
          VITE_DEBUG_VERBOSE: ${{ vars.VITE_DEBUG_VERBOSE }}
          VITE_DEFAULT_LOCALE: ${{ vars.VITE_DEFAULT_LOCALE }}
          VITE_POLLING_INTERVAL_SECONDS: ${{ vars.VITE_POLLING_INTERVAL_SECONDS }}
          VITE_APPLICATIONINSIGHTS_CONNECTION_STRING: ${{ secrets.APPLICATIONINSIGHTS_CONNECTION_STRING }}
        with:
          working_directory: ${{ inputs.workingDirectory }}
          environment: ${{ inputs.environment }}

      - name: Create .env for Report Design
        if: github.repository == 'felipementelgn-web-report-design'
        uses: felipementel/gh-actions/.github/actions/react-env-report-design@main
        env:
          VITE_REPORT_DESIGN_API_URL: ${{ vars.VITE_REPORT_DESIGN_API_URL }}
          VITE_AUTH_SERVICE_URL: ${{ vars.VITE_AUTH_SERVICE_URL }}
          VITE_APPLICATIONINSIGHTS_CONNECTION_STRING: ${{ secrets.APPLICATIONINSIGHTS_CONNECTION_STRING }}
        with:
          working_directory: ${{ inputs.workingDirectory }}
          environment: ${{ inputs.environment }}

      - name: Build
        run: |
          # Seleciona o script de build baseado no environment
          case "${{ inputs.environment }}" in
            "DEV")
              echo -e "🏗️${GREEN} Building for DEVELOPMENT environment..."
              npm run build:dev
              ;;
            "HML")
              echo -e "🏗️${GREEN} Building for STAGING environment..."
              npm run build:staging
              ;;
            "PRD")
              echo -e "🏗️${GREEN} Building for PRODUCTION environment..."
              npm run build:production
              ;;
            *)
              echo -e "🏗️${GREEN} Building with default mode (production)..."
              npm run build
              ;;
          esac
        working-directory: ${{ inputs.workingDirectory }}

      - name: Verify build output
        run: |
          test -d dist || (echo -e "${RED} ❌ dist não gerado" && exit 1)
          test -f dist/index.html || (echo -e "${RED} ❌ index.html não encontrado" && exit 1)
          echo -e "${GREEN} ✅ Build OK"
          ls -la dist/
        working-directory: ${{ inputs.workingDirectory }}

      - name: 📸 SonarCloud Analysis
        uses: felipementel/gh-actions/.github/actions/tools/code-quality/sonar-cloud-node@main
        with:
          has-tests: 'false'
          sonar-project-key: ${{ secrets.SONAR_PROJECT_KEY }}
          sonar-organization: ${{ vars.SONAR_ORGANIZATION }}
          sonar-token: ${{ secrets.SONAR_TOKEN }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          sonar-exclusions: ${{ inputs.sonarExclusions }}
          working-directory: ${{ inputs.workingDirectory }}

      - name: Upload artifact for deployment job
        uses: felipementel/reusable-workflows/.github/actions/_wrapper/github/upload-artifact@main
        with:
          name: static-website
          path: ${{ inputs.workingDirectory }}/dist
          retention-days: 1

      - name: Generate git tag
        run: |
          echo "TAG_NAME=v${{ steps.get-package-data.outputs.TAG }}"
          git tag -a v${{ steps.get-package-data.outputs.TAG }} -m "Release v${{ steps.get-package-data.outputs.TAG }} at $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
          git push origin v${{ steps.get-package-data.outputs.TAG }}
        continue-on-error: true

      - name: Summary
        run: |
          APP_VERSION=$(node -p "require('${{ inputs.workingDirectory }}/package.json').version")
          echo "## ✅ Build Completed Successfully" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Version** | \`$APP_VERSION\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Branch** | \`${{ github.ref_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Commit** | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Environment** | \`${{ inputs.environment }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Node.js** | \`${{ inputs.nodeVersion }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **npm** | \`$(npm --version)\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 🔍 Checks Performed:" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Dependencies installed" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ npm audit (dependency vulnerabilities)" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ ESLint executed" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Build completed successfully" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Build output verified" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Trivy License Scan" >> $GITHUB_STEP_SUMMARY

  update-cicd-badge:
    name: Update CI/CD Badge
    if: ${{ always() && github.ref == 'refs/heads/main' }}
    needs: [build-and-test]
    runs-on: self-hosted
    steps:
      - name: 🔍 Checkout (package.json only)
        uses: felipementel/reusable-workflows/.github/actions/_wrapper/github/checkout@main
        with:
          sparse-checkout: |
            ${{ inputs.workingDirectory }}/package.json
          sparse-checkout-cone-mode: false

      - name: Setup Node ${{ inputs.nodeVersion }}
        uses: felipementel/reusable-workflows/.github/actions/_wrapper/github/setup-node@main
        with:
          node-version: ${{ inputs.nodeVersion }}

      - name: 🔍 Determine pipeline result
        id: result
        shell: bash
        run: |
          BUILD="${{ needs.build-and-test.result }}"

          echo "build=${BUILD}"

          if [[ "$BUILD" == "failure" ]]; then
            echo "status=failure" >> $GITHUB_OUTPUT
          elif [[ "$BUILD" == "cancelled" ]]; then
            echo "status=cancelled" >> $GITHUB_OUTPUT
          else
            echo "status=success" >> $GITHUB_OUTPUT
          fi

      - name: 🏷️ Update Badge Gist
        uses: felipementel/gh-actions/.github/actions/update-badge-gist@main
        with:
          gist_id: ${{ vars.BADGE_GIST_ID }}
          gist_token: ${{ secrets.BADGE_GIST_TOKEN }}
          badge_type: cicd
          build_status: ${{ steps.result.outputs.status }}
          version_file: ${{ inputs.workingDirectory }}/package.json
