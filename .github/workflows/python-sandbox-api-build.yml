name: Python API Build 🐍
run-name: "${{ github.actor }} - ${{ inputs.buildMode }} - ${{ inputs.environment }} - ${{ github.run_id }}"

on:
  workflow_call:
    inputs:
      buildMode:
        description: "Which action do you want?"
        required: false
        default: 'Build'
        type: string
      environment:
        type: string
        description: 'Environment to run the workflow'
        required: true
        default: 'DEV'
      pythonVersion:
        type: string
        description: 'Python version to use in the workflow'
        required: false
        default: '3.14'
      projectName:
        type: string
        description: 'Project name'
        required: true
      imageName:
        type: string
        description: 'Docker image name'
        required: true
      envMapFile:
        description: 'Env/Secret mapping file'
        required: false
        type: string
        default: ''
      mainFile:
        type: string
        description: 'Main Python file'
        required: false
        default: 'main.py'
      sparseCheckout:
        description: 'Sparse checkout pattern'
        required: false
        type: string
        default: 'src/'
      gitLeaks:
        description: 'Enable Gitleaks security scan'
        required: false
        type: boolean
        default: true
      appDir:
        description: 'Application directory (app or src)'
        required: false
        type: string
        default: 'src'
      coverageThreshold:
        description: 'Minimum coverage percentage required (0-100)'
        required: false
        type: number
        default: 0
      dockerfileFolder:
        description: 'Folder containing the Dockerfile (relative to repo root)'
        required: false
        type: string
        default: 'docker'
      #registry
      registry:
        type: string
        description: 'Container registry URL (e.g. ghcr.io, docker.io, myacr.azurecr.io)'
        required: false
        default: 'ghcr.io'
      registryUsername:
        type: string
        description: 'Registry username / org. Defaults to github.actor when empty (suitable for ghcr.io)'
        required: false
        default: ''
    secrets:
      GITLEAKS_LICENSE:
        required: true
        description: 'Gitleaks License'
      GH_PACKAGES_TOKEN:
        required: true
        description: 'GitHub Packages token for image push'
      CODECOV_TOKEN:
        required: false
        description: 'Codecov token for coverage upload'
      BADGE_GIST_TOKEN:
        required: false
        description: 'Gist token for CI/CD badge update'
      REGISTRY_PASSWORD:
        required: false
        description: 'Registry password/token. Defaults to GH_PACKAGES_TOKEN for ghcr.io'
    outputs:
      tag-version:
        description: 'The version tag built and published'
        value: ${{ jobs.build.outputs.tag-version }}
      image-exists:
        description: 'Whether the image already existed in the registry (true/false)'
        value: ${{ jobs.check-image.outputs.image-exists }}

env:
  # Colors for output
  RED: '\033[0;31m'
  GREEN: '\033[0;32m'
  YELLOW: '\033[0;33m'
  BLUE: '\033[0;34m'
  RESET: '\033[0m'
  BOLD: '\033[1m'
  BOLD_GREEN: '\033[1;32m'
  BOLD_YELLOW: '\033[1;33m'

  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build:
    name: Build Python FastAPI
    environment: ${{ inputs.environment }}
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}
      cancel-in-progress: true
    outputs:
      tag-version: ${{ steps.get-version.outputs.TAG }}
      now: ${{ steps.get-env.outputs.NOW }}
    runs-on: self-hosted
    timeout-minutes: 20
    permissions:
      contents: read
      security-events: write

    steps:

      - name: 🏷️ Set Badge to Running
        if: ${{ github.ref == 'refs/heads/main' }}
        uses: GreenNexus-Core/gh-actions/.github/actions/update-badge-gist@main
        with:
          gist_id: ${{ vars.BADGE_GIST_ID }}
          gist_token: ${{ secrets.BADGE_GIST_TOKEN }}
          badge_type: cicd
          build_status: running

      - name: 🧭 Get Environment
        id: get-env
        run: |
          echo -e "${GREEN} ⚠️ Environment ${{ inputs.environment }}"
          echo "NOW=$(date +'%Y-%m-%dT%H:%M:%S')" >> $GITHUB_OUTPUT

      - name: 📥 Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.ref }}
          fetch-depth: 0
          sparse-checkout: |
            ${{ inputs.sparseCheckout }}
            pyproject.toml
            infra/aca.envmap
            tests/
          sparse-checkout-cone-mode: false

      - name: 🧱📤 Git Leaks
        if: ${{ inputs.gitLeaks && !(github.event_name == 'pull_request' && github.actor == 'dependabot[bot]') }}
        uses: GreenNexus-Core/gh-actions/.github/actions/git-leaks@main
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          gitleaks-license: ${{ secrets.GITLEAKS_LICENSE }}
          enable-summary: 'true'
          enable-upload-artifact: 'true'
          notify-user-list: '@felipementel'

      # Trivy no source/repo SAST scan (vulnerabilities, secrets, misconfigurations)
      - name: 🔎 Trivy - Filesystem Scan (vuln, secret, misconfig)
        uses: GreenNexus-Core/gh-actions/.github/actions/trivy-scan@main
        with:
          scan-type: 'fs'
          scan-ref: '${{ env.working_directory }}'
          scanners: 'vuln,misconfig,secret'
          format: 'github'
          severity: 'HIGH,CRITICAL'
          ignore-unfixed: true
          exit-code: '1'
          trivyignores: ${{ steps.check-trivyignore.outputs.path }}

      - name: 🔎 Trivy - license scan
        uses: GreenNexus-Core/gh-actions/.github/actions/trivy-scan@main
        with:
          scan-type: 'fs'
          scan-ref: '${{ env.working_directory }}'
          scanners: 'license'
          format: 'github'
          severity: 'MEDIUM,HIGH,CRITICAL'
          ignore-unfixed: true
          exit-code: '1'
          trivyignores: ${{ steps.check-trivyignore.outputs.path }}

      - name: 🏷️ Extract Application Version
        uses: GreenNexus-Core/gh-actions/.github/actions/python-get-version@main
        id: get-version
        with:
          environment: ${{ inputs.environment }}

      - name: 🐍 Set up Python ${{ inputs.pythonVersion }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ inputs.pythonVersion }}
          cache: pip

      - name: ✅ Check Python version
        run: |
          python --version
          pip --version

      - name: 📦 Install dependencies
        env:
          GH_PACKAGES_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN }}
        run: |
          python -m pip install --upgrade pip
          git config --global url."https://${GH_PACKAGES_TOKEN}@github.com/".insteadOf "https://github.com/"
          python -m pip install -e ".[dev]"

      - name: ✅ Check dependencies
        run: |
          pip check

      - name: 🔍 Check for tests
        id: check-tests
        shell: bash
        run: |
          if find . -name "*test*.py" -o -name "test_*.py" | grep -q .; then
            echo "HAS_TESTS=true" >> "$GITHUB_OUTPUT"
            echo -e "✅${GREEN} Arquivos de teste encontrados."
          else
            echo "HAS_TESTS=false" >> "$GITHUB_OUTPUT"
            echo -e "⚠️${YELLOW} Nenhum arquivo de teste encontrado."
          fi

      - name: 🧪 Run Python tests
        if: ${{ steps.check-tests.outputs.HAS_TESTS == 'true' }}
        run: |
          # Install test dependencies if they exist
          if [ -f "tests/requirements-test.txt" ]; then
            pip install -r tests/requirements-test.txt
          fi

          # Install pytest packages
          pip install pytest pytest-cov pytest-mock pytest-asyncio anyio || true

          # Set testing environment
          export TESTING=1
          export DISABLE_SSL_VERIFY=true

          # Run unit tests only with coverage
          echo -e "🧪${GREEN} Running unit tests with coverage..."
          python -m pytest -v \
            --cov=${{ inputs.appDir }} \
            --cov-report=html:tests/results/htmlcov \
            --cov-report=xml:tests/results/coverage.xml \
            --cov-report=term-missing \
            --cov-fail-under=${{ inputs.coverageThreshold }} \
            tests/ || echo -e "⚠️${YELLOW} Tests completed with warnings"

      - name: 📊 Upload coverage to Codecov
        if: ${{ steps.check-tests.outputs.HAS_TESTS == 'true' }}
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./tests/results/coverage.xml
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false

      - name: 🎯 Generate coverage badge
        if: ${{ steps.check-tests.outputs.HAS_TESTS == 'true' }}
        run: |
          # Extract coverage percentage from coverage.xml
          COVERAGE=$(python -c "
          import xml.etree.ElementTree as ET
          try:
            tree = ET.parse('tests/results/coverage.xml')
            root = tree.getroot()
            coverage = float(root.attrib['line-rate']) * 100
            print(f'{coverage:.1f}')
          except:
            print('0.0')
          ")

          echo "Coverage: ${COVERAGE}%"

          # Determine badge color
          if (( $(echo "$COVERAGE >= 90" | bc -l) )); then
            COLOR="brightgreen"
          elif (( $(echo "$COVERAGE >= 70" | bc -l) )); then
            COLOR="yellow"
          else
            COLOR="red"
          fi

          # Create badge URL
          BADGE_URL="https://img.shields.io/badge/coverage-${COVERAGE}%25-${COLOR}"
          echo -e "🛡️${GREEN} Badge URL: $BADGE_URL"

          # Create badge file
          echo "![Coverage](${BADGE_URL})" > coverage-badge.md
          echo "COVERAGE_PERCENTAGE=${COVERAGE}" >> $GITHUB_ENV
          echo "BADGE_COLOR=${COLOR}" >> $GITHUB_ENV

      - name: 🧪📤 Upload test coverage artifacts
        if: ${{ steps.check-tests.outputs.HAS_TESTS == 'true' }}
        uses: actions/upload-artifact@v7
        with:
          name: coverage-reports-${{ github.run_number }}
          path: |
            tests/results/htmlcov/
            tests/results/coverage.xml
            coverage-badge.md
          retention-days: 30

      - name: Code Quality
        uses: GreenNexus-Core/gh-actions/.github/actions/python-code-quality@main
        with:
          app_dir: ${{ inputs.appDir }}

      - name: 🧾 Write to workflow job summary
        run: |
          SUMMARY='
          # 📦 Build Completed

          | Campo          | Valor |
          |----------------|-------|
          | Versão         | ${{ steps.get-version.outputs.TAG }} |
          | Data           | ${{ steps.get-env.outputs.NOW }} |
          | Python Version | ${{ inputs.pythonVersion }} |
          | Environment    | ${{ inputs.environment }} |

          ## ✅ Build Status
          - ✅ Código Python validado
          - ✅ Dependências instaladas
          - ✅ Testes executados (se disponíveis)
          - ✅ Linting executado'
          echo "$SUMMARY" >> $GITHUB_STEP_SUMMARY

  check-image:
    name: Check if Docker image exists
    if: ${{ inputs.buildMode == 'Build + Push' }}
    environment: ${{ inputs.environment }}
    runs-on: self-hosted
    needs: build
    outputs:
      image-exists: ${{ steps.check-image-and-tag.outputs.IMAGE_EXISTS }}
    steps:
      - name: 🔐 Log in to registry
        uses: docker/login-action@v4
        with:
          registry: ${{ inputs.registry }}
          username: ${{ inputs.registryUsername || github.actor }}
          password: ${{ secrets.REGISTRY_PASSWORD || secrets.GH_PACKAGES_TOKEN }}

      - name: 🔍 Check if image exists
        id: check-image-and-tag
        run: |
          IMAGE_TAG="${{ inputs.registry }}/${{ inputs.registryUsername || github.actor }}/${{ inputs.imageName }}:${{ needs.build.outputs.tag-version }}"
          echo "Checking existence of $IMAGE_TAG..."
          if docker manifest inspect "$IMAGE_TAG" > /dev/null 2>&1; then
            echo -e "✅ ${GREEN} Image exists in registry"
            echo "IMAGE_EXISTS=true" >> "$GITHUB_OUTPUT"
          else
            echo -e "🔍 ${RED} Image does not exist in registry"
            echo "IMAGE_EXISTS=false" >> "$GITHUB_OUTPUT"
          fi

  push-image:
    name: Build and Push Docker Image
    if: ${{ inputs.buildMode == 'Build + Push' && needs.check-image.outputs.image-exists == 'false' }}
    environment: ${{ inputs.environment }}
    needs: [build, check-image]
    runs-on: self-hosted
    permissions:
      packages: write
      contents: write

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: 🏗️ Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: 🏗️ Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
        with:
          version: latest
          platforms: linux/amd64,linux/arm64

      - name: 🔐 Log in to registry
        uses: docker/login-action@v4
        with:
          registry: ${{ inputs.registry }}
          username: ${{ inputs.registryUsername || github.actor }}
          password: ${{ secrets.REGISTRY_PASSWORD || secrets.GH_PACKAGES_TOKEN }}

      - name: 🏷️ Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: |
            ${{ inputs.registry }}/${{ inputs.registryUsername || github.actor }}/${{ inputs.imageName }}

      - name: 🐳 Build Docker image (without push)
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ inputs.dockerfileFolder }}/Dockerfile
          push: false
          load: true
          platforms: linux/amd64
          secrets: |
            GITHUB_TOKEN=${{ secrets.GH_PACKAGES_TOKEN }}
          tags: |
            ${{ inputs.registry }}/${{ inputs.registryUsername || github.actor }}/${{ inputs.imageName }}:${{ needs.build.outputs.tag-version }}
          labels: |
            ${{ steps.meta.outputs.labels }}
            org.opencontainers.image.version=${{ needs.build.outputs.tag-version }}
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: 🔍 Scan Docker image for vulnerabilities
        uses: GreenNexus-Core/gh-actions/.github/actions/trivy-scan@main
        with:
          image-ref: ${{ inputs.registry }}/${{ inputs.registryUsername || github.actor }}/${{ inputs.imageName }}:${{ needs.build.outputs.tag-version }}
          severity: 'CRITICAL,HIGH'
          format: 'sarif'
          output-file: 'trivy-results.sarif'
          upload-to-security: 'true'
          scan-type: 'image'
          exit-code: '1'

      - name: 🚀 Push Docker image (after security scan passed)
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ inputs.dockerfileFolder }}/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          secrets: |
            GITHUB_TOKEN=${{ secrets.GH_PACKAGES_TOKEN }}
          tags: |
            ${{ inputs.registry }}/${{ inputs.registryUsername || github.actor }}/${{ inputs.imageName }}:${{ needs.build.outputs.tag-version }}
          labels: |
            ${{ steps.meta.outputs.labels }}
            org.opencontainers.image.version=${{ needs.build.outputs.tag-version }}
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Generate git tag
        run: |
          echo "TAG_NAME=v${{ needs.build.outputs.tag-version }}"
          git tag -a v${{ needs.build.outputs.tag-version }} -m "Release v${{ needs.build.outputs.tag-version }} at $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
          git push origin v${{ needs.build.outputs.tag-version }}

      - name: 📝 Write image summary
        run: |
          SUMMARY='
          # 🐳 Docker Image Published

          | Campo | Valor |
          |-------|-------|
          | Image | ${{ inputs.registry }}/${{ inputs.registryUsername || github.actor }}/${{ inputs.imageName }} |
          | Tag | ${{ needs.build.outputs.tag-version }} |
          | Registry | ${{ inputs.registry }} |
          | Platforms | linux/amd64, linux/arm64 |
          | Security Scan | ✅ Passed (no CRITICAL/HIGH vulnerabilities) |
          | Status | ✅ Publicada com sucesso |'
          echo "$SUMMARY" >> $GITHUB_STEP_SUMMARY

  notify-image-exists:
    name: Notify Image Already Exists
    if: ${{ inputs.buildMode == 'Build + Push' && needs.check-image.outputs.image-exists == 'true' }}
    needs: [build, check-image]
    environment: ${{ inputs.environment }}
    runs-on: self-hosted
    steps:
      - name: 📝 Notify existing image
        run: |
          SUMMARY='
          # ⚠️ Imagem Já Existe

          A imagem Docker com a tag **${{ needs.build.outputs.tag-version }}** já existe no registry.

          | Campo | Valor |
          |-------|-------|
          | Tag | ${{ needs.build.outputs.tag-version }} |
          | Registry | ${{ inputs.registry }}/${{ inputs.registryUsername || github.actor }}/${{ inputs.imageName }} |
          | Status | ⚠️ Imagem já existe |

          **Ações puladas:**
          - ⏭️ Build da imagem Docker
          - ⏭️ Push para o registry

          Para forçar um novo build, altere a versão ou delete a imagem existente.'
          echo "$SUMMARY" >> $GITHUB_STEP_SUMMARY

  update-cicd-badge:
    name: Update CI/CD Badge
    if: ${{ always() && github.ref == 'refs/heads/main' }}
    needs: [build, push-image, notify-image-exists]
    runs-on: self-hosted
    steps:
      - name: 📥 Checkout (pyproject.toml only)
        uses: actions/checkout@v6
        with:
          sparse-checkout: |
            pyproject.toml
          sparse-checkout-cone-mode: false

      - name: 🔍 Determine pipeline result
        id: result
        shell: bash
        run: |
          BUILD="${{ needs.build.result }}"
          PUSH="${{ needs.push-image.result }}"
          NOTIFY="${{ needs.notify-image-exists.result }}"

          echo "build=${BUILD} push=${PUSH} notify=${NOTIFY}"

          if [[ "$BUILD" == "failure" || "$PUSH" == "failure" || "$NOTIFY" == "failure" ]]; then
            echo "status=failure" >> $GITHUB_OUTPUT
          elif [[ "$BUILD" == "cancelled" || "$PUSH" == "cancelled" || "$NOTIFY" == "cancelled" ]]; then
            echo "status=cancelled" >> $GITHUB_OUTPUT
          else
            echo "status=success" >> $GITHUB_OUTPUT
          fi

      - name: 🏷️ Update Badge Gist
        uses: GreenNexus-Core/gh-actions/.github/actions/update-badge-gist@main
        with:
          gist_id: ${{ vars.BADGE_GIST_ID }}
          gist_token: ${{ secrets.BADGE_GIST_TOKEN }}
          badge_type: cicd
          build_status: ${{ steps.result.outputs.status }}
          version_file: pyproject.toml
