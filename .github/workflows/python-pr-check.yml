name: Pull Request Validation - Python

on:
  workflow_call:
    inputs:
      sparse_checkout:
        description: 'Sparse checkout pattern'
        required: false
        type: string
        default: 'src/'
      python_version:
        description: 'Python version to use'
        required: false
        type: string
        default: '3.14'
      app_dir:
        description: 'Application directory (app or src)'
        required: false
        type: string
        default: 'src'
      coverage_threshold:
        description: 'Minimum coverage percentage required (0-100)'
        required: false
        type: number
        default: 80
      project_name:
        description: 'Project name for Docker image validation'
        required: false
        type: string
        default: ''
      image_name:
        description: 'Docker image name for registry validation'
        required: false
        type: string
        default: ''
  workflow_dispatch:
    inputs:
      git_leaks:
        description: 'Enable Gitleaks security scan'
        required: false
        type: boolean
        default: true

env:
  # Colors for output
  RED: '\033[0;31m'
  GREEN: '\033[0;32m'
  YELLOW: '\033[0;33m'
  BLUE: '\033[0;34m'
  RESET: '\033[0m'
  BOLD: '\033[1m'
  BOLD_GREEN: '\033[1;32m'
  BOLD_YELLOW: '\033[1;33m'

  # Container Registry
  registry: 'ghcr.io/greennexus-core'

  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  # Job 1: Linting e formatação
  lint:
    name: Lint & Format Check
    runs-on: self-hosted
    permissions:
      contents: read
      security-events: write
      pull-requests: read
      statuses: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ github.ref }}
          fetch-depth: 0
          sparse-checkout: |
            ${{ inputs.sparse_checkout }}
            pyproject.toml
          sparse-checkout-cone-mode: false

      - name: 🏷️ Set Badge to Running
        if: ${{ !(github.event_name == 'pull_request' && github.actor == 'dependabot[bot]') }}
        uses: GreenNexus-Core/gh-actions/.github/actions/update-badge-gist@main
        with:
          gist_id: ${{ vars.BADGE_GIST_ID }}
          gist_token: ${{ secrets.BADGE_GIST_TOKEN }}
          badge_type: pr
          build_status: running

      - name: 🧱📤 Git Leaks
        if: ${{ !(github.event_name == 'pull_request' && github.actor == 'dependabot[bot]') }}
        uses: GreenNexus-Core/gh-actions/.github/actions/git-leaks@main
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          gitleaks-license: ${{ secrets.GITLEAKS_LICENSE }}
          enable-summary: 'true'
          enable-upload-artifact: 'true'
          notify-user-list: '@felipementel'

      # - name: 🔍 Check trivyignore
      #   id: check-trivyignore
      #   shell: bash
      #   run: |
      #     if [ -f .trivyignore.yaml ]; then
      #       echo -e "${GREEN} ✅ .trivyignore.yaml encontrado"
      #       echo "path=.trivyignore.yaml" >> "$GITHUB_OUTPUT"
      #     else
      #       echo -e "${YELLOW} ℹ️ .trivyignore.yaml não encontrado, ignorefile não será usado"
      #       echo "path=" >> "$GITHUB_OUTPUT"
      #     fi

      # Trivy no source/repo SAST scan (vulnerabilities, secrets, misconfigurations)
      - name: 🔎 Trivy - Filesystem Scan (vuln, secret, misconfig)
        uses: GreenNexus-Core/gh-actions/.github/actions/trivy-scan@main
        with:
          scan-type: 'fs'
          scan-ref: '${{ env.working_directory }}'
          scanners: 'vuln,misconfig,secret'
          format: 'github'
          severity: 'MEDIUM,HIGH,CRITICAL'
          ignore-unfixed: true
          trivyignores: ${{ hashFiles('.trivyignore.yaml') != '' && '.trivyignore.yaml' || '' }}
          exit-code: '1'

      - name: 🔎 Trivy - License Scan (vuln, secret, misconfig)
        uses: GreenNexus-Core/gh-actions/.github/actions/trivy-scan@main
        with:
          scan-type: 'fs'
          scan-ref: '${{ env.working_directory }}'
          scanners: 'license'
          format: 'github'
          severity: 'MEDIUM,HIGH,CRITICAL'
          ignore-unfixed: true
          trivyignores: ${{ hashFiles('.trivyignore.yaml') != '' && '.trivyignore.yaml' || '' }}
          exit-code: '1'

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ inputs.python_version }}
          cache: 'pip'

      - name: Install dependencies
        env:
          GH_PACKAGES_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN }}
        run: |
          python -m pip install --upgrade pip
          git config --global url."https://${GH_PACKAGES_TOKEN}@github.com/".insteadOf "https://github.com/"
          pip install -e ".[dev]"

      - name: Code Quality
        uses: GreenNexus-Core/gh-actions/.github/actions/python-code-quality@main
        with:
          app_dir: ${{ inputs.app_dir }}

      - name: Generate OpenAPI spec (FastAPI)
        run: |
          export PYTHONPATH=$PYTHONPATH:$(pwd)/${{ inputs.app_dir }}
          if [ -f "${{ inputs.app_dir }}/.env.example" ]; then
            cp "${{ inputs.app_dir }}/.env.example" "${{ inputs.app_dir }}/.env"
          fi
          export LOG_DIR="${{ github.workspace }}/.logs"
          mkdir -p "$LOG_DIR"
          python - << 'EOF'
          from ${{ inputs.app_dir }}.main import app
          import json
          with open("openapi.json", "w") as f:
              json.dump(app.openapi(), f, indent=2)
          EOF

      - name: Upload OpenAPI spec artifact
        uses: actions/upload-artifact@v7
        with:
          name: openapi-${{ github.run_number }}.json
          path: |
            openapi.json

      # - name: Download OWASP Spectral ruleset
      #   run: |
      #     curl -sSL https://unpkg.com/@stoplight/spectral-owasp-ruleset/dist/ruleset.mjs \
      #       -o spectral-owasp.mjs

      # - name: Run Spectral
      #   uses: stoplightio/spectral-action@latest
      #   with:
      #     # Ajuste para onde o openapi.json foi gerado
      #     file_glob: 'openapi.json'
      #     spectral_ruleset: spectral-owasp.mjs

  # Job 2: Testes de unidade
  test-unit:
    name: Unit Tests
    runs-on: self-hosted
    needs: lint

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          sparse-checkout: |
            ${{ inputs.sparse_checkout }}
            pyproject.toml
          sparse-checkout-cone-mode: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ inputs.python_version }}
          cache: pip

      - name: Install dependencies
        env:
          GH_PACKAGES_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN }}
        run: |
          python -m pip install --upgrade pip
          git config --global url."https://${GH_PACKAGES_TOKEN}@github.com/".insteadOf "https://github.com/"
          pip install -e ".[dev]"

      - name: 🔍 Check for tests
        id: check-tests
        run: |
          if [ -d "tests" ] && [ -n "$(find tests -name 'test_*.py' -o -name '*_test.py')" ]; then
            echo "HAS_TESTS=true" >> "$GITHUB_OUTPUT"
            echo -e "✅${GREEN} Test files found."
          else
            echo "HAS_TESTS=false" >> "$GITHUB_OUTPUT"
            echo -e "⚠️${YELLOW} No test files found. Skipping tests."
          fi

      - name: Run unit tests with coverage
        if: ${{ steps.check-tests.outputs.HAS_TESTS == 'true' }}
        run: |
          # Set testing environment
          export TESTING=1
          export DISABLE_SSL_VERIFY=true

          # Run unit tests only with coverage
          echo -e "🧪${BLUE} Running unit tests with coverage..."
          pytest -v \
            --cov=${{ inputs.app_dir }} \
            --cov-report=xml:tests/results/coverage.xml \
            --cov-report=html:tests/results/htmlcov \
            --cov-report=term-missing \
            --cov-fail-under=${{ inputs.coverage_threshold }}

      - name: Upload coverage to Codecov
        if: ${{ steps.check-tests.outputs.HAS_TESTS == 'true' }}
        uses: codecov/codecov-action@v5
        with:
          files: ./tests/results/coverage.xml
          flags: unittests
          name: codecov-unit
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Generate coverage badge
        if: github.ref == 'refs/heads/main'
        run: |
          COVERAGE=$(python -c "
          import xml.etree.ElementTree as ET
          tree = ET.parse('tests/results/coverage.xml')
          root = tree.getroot()
          coverage = float(root.attrib['line-rate']) * 100
          print(f'{coverage:.1f}')
          ")
          echo "COVERAGE_PERCENT=$COVERAGE" >> $GITHUB_ENV

          # Generate badge URL
          if (( $(echo "$COVERAGE >= 90" | bc -l) )); then
            COLOR="brightgreen"
          elif (( $(echo "$COVERAGE >= 80" | bc -l) )); then
            COLOR="green"  
          elif (( $(echo "$COVERAGE >= 70" | bc -l) )); then
            COLOR="yellow"
          else
            COLOR="red"
          fi
          echo "BADGE_COLOR=$COLOR" >> $GITHUB_ENV

      - name: Archive coverage HTML report
        if: ${{ steps.check-tests.outputs.HAS_TESTS == 'true' }}
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report-unit
          path: tests/results/htmlcov/
          retention-days: 30

  # Job 3: Validação de versão
  version-check:
    name: Version Validation
    runs-on: self-hosted
    permissions:
      contents: read
      packages: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: 🏷️ Extract Application Version
        uses: GreenNexus-Core/gh-actions/.github/actions/python-get-version@main
        id: get_version
        with:
          environment: DEV

      - name: Validate semantic versioning format
        run: |
          VERSION="${{ steps.get_version.outputs.VERSION }}"
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo -e "${RED}❌ ERROR: Version '$VERSION' does not follow semantic versioning (X.Y.Z)"
            exit 1
          fi
          echo -e "${GREEN}✅ Version format is valid: $VERSION"

      - name: 🔍 Check if tag already exists
        uses: GreenNexus-Core/gh-actions/.github/actions/check-tag-exists@main
        with:
          tag: ${{ steps.get_version.outputs.TAG }}
          version_file: pyproject.toml

      - name: 🔐 Log in to GHCR for image validation
        if: ${{ inputs.image_name != '' }}
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GH_PACKAGES_TOKEN }}

      - name: 🔍 Check if Docker image with version tag exists
        if: ${{ inputs.image_name != '' }}
        id: check-image
        run: |
          VERSION="${{ steps.get_version.outputs.VERSION }}"
          IMAGE_TAG="${{ env.registry }}/${{ inputs.image_name }}:$VERSION"

          echo "🔍 Checking if image exists: $IMAGE_TAG"

          if docker manifest inspect "$IMAGE_TAG" > /dev/null 2>&1; then
            echo "IMAGE_EXISTS=true" >> "$GITHUB_OUTPUT"
            echo -e "${RED}❌ ERROR: Docker image with tag $VERSION already exists in registry!"
            echo "::error::Image $IMAGE_TAG already exists. Please increment the version in pyproject.toml"
            exit 1
          else
            echo "IMAGE_EXISTS=false" >> "$GITHUB_OUTPUT"
            echo -e "${GREEN}✅ Docker image with tag $VERSION does not exist (OK to proceed)"
          fi

      - name: Version summary
        if: always()
        run: |
          echo "## 📋 Version Information" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Item | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Version** | \`${{ steps.get_version.outputs.VERSION }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Branch** | \`${{ github.ref_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Commit** | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY

          if [[ "${{ inputs.image_name }}" != "" ]]; then
            echo "| **Docker Image** | \`${{ env.registry }}/${{ inputs.image_name }}\` |" >> $GITHUB_STEP_SUMMARY

            if [[ "${{ steps.check-image.outputs.IMAGE_EXISTS }}" == "true" ]]; then
              echo "| **Image Status** | ❌ Already exists in registry |" >> $GITHUB_STEP_SUMMARY
              echo "" >> $GITHUB_STEP_SUMMARY
              echo "### ⚠️ Action Required" >> $GITHUB_STEP_SUMMARY
              echo "" >> $GITHUB_STEP_SUMMARY
              echo "The Docker image with version \`${{ steps.get_version.outputs.VERSION }}\` already exists in the registry." >> $GITHUB_STEP_SUMMARY
              echo "Please increment the version in \`pyproject.toml\` before merging." >> $GITHUB_STEP_SUMMARY
            else
              echo "| **Image Status** | ✅ Version available for use |" >> $GITHUB_STEP_SUMMARY
            fi
          fi

  # Job 5: Build validation
  build:
    name: Build Validation
    runs-on: self-hosted
    needs: [test-unit, version-check]

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ inputs.python_version }}
          cache: pip

      - name: Install dependencies
        env:
          GH_PACKAGES_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN }}
        run: |
          python -m pip install --upgrade pip
          git config --global url."https://${GH_PACKAGES_TOKEN}@github.com/".insteadOf "https://github.com/"
          pip install -e .

      - name: Check dependencies
        run: |
          pip check

      - name: Build summary
        run: |
          echo "## Build Validation" >> $GITHUB_STEP_SUMMARY
          echo "✅ Dependencies are consistent" >> $GITHUB_STEP_SUMMARY

  # Job 6: Security scan
  security:
    name: Security Scan
    runs-on: self-hosted
    needs: lint
    permissions:
      contents: read
      security-events: write
      actions: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ inputs.python_version }}
          cache: pip

      - name: Install security tools
        env:
          GH_PACKAGES_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN }}
        run: |
          python -m pip install --upgrade pip
          git config --global url."https://${GH_PACKAGES_TOKEN}@github.com/".insteadOf "https://github.com/"
          pip install -e ".[dev]"

      - name: Run Bandit security scan
        run: |
          # Check if .bandit config file exists
          if [ -f ".bandit" ]; then
            echo -e "${GREEN}Using .bandit configuration file"
            bandit -r ${{ inputs.app_dir }} -c .bandit -f json -o bandit-report.json || true
            bandit -r ${{ inputs.app_dir }} -c .bandit -f screen
          else
            echo -e "${YELLOW}No .bandit config found, using default settings"
            bandit -r ${{ inputs.app_dir }} -f json -o bandit-report.json || true
            bandit -r ${{ inputs.app_dir }} -f screen
          fi

      # https://www.getsafety.com/pricing
      # - name: Check dependencies for vulnerabilities (Safety)
      #   run: |
      #     if [ -n "$SAFETY_API_KEY" ]; then
      #     safety scan --output json || true
      #     safety scan
      #     else
      #       echo "⚠️ SAFETY_API_KEY not set — skipping Safety scan"
      #     fi
      #   env:
      #     SAFETY_API_KEY: ${{ secrets.SAFETY_API_KEY }}

      # https://www.getsafety.com/pricing

      - name: Run Safety CLI to check for vulnerabilities
        uses: pyupio/safety-action@v1
        with:
          api-key: ${{ secrets.SAFETY_API_KEY }}

      # - name: Check dependencies for vulnerabilities (pip-audit)
      #   run: |
      #     pip install pip-audit
      #     pip-audit --format json --output pip-audit-report.json || true
      #     pip-audit

      - name: Upload security reports
        uses: actions/upload-artifact@v7
        with:
          name: security-reports
          path: |
            bandit-report.json
          retention-days: 30
          # pip-audit-report.json

      - name: 🐳 Build Docker image for scanning
        if: ${{ inputs.image_name != '' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN }}
        run: |
          echo -e "${BLUE}Building Docker image for security scan..."
          if [ -d "docker" ] && [ -f "docker/Dockerfile" ]; then
            docker build \
              --secret id=GITHUB_TOKEN,env=GITHUB_TOKEN \
              -f docker/Dockerfile \
              -t scan-image:pr-${{ github.event.pull_request.number }} \
              .
            echo "IMAGE_BUILT=true" >> $GITHUB_ENV
          else
            echo "No Dockerfile found, skipping image scan"
            echo "IMAGE_BUILT=false" >> $GITHUB_ENV
          fi

      - name: 🔍 Trivy - Scan Docker image
        if: ${{ inputs.image_name != '' && env.IMAGE_BUILT == 'true' }}
        uses: GreenNexus-Core/gh-actions/.github/actions/trivy-scan@main
        with:
          scan-type: 'image'
          image-ref: scan-image:pr-${{ github.event.pull_request.number }}
          severity: 'CRITICAL,HIGH,MEDIUM'
          format: 'sarif'
          output-file: 'trivy-pr-results.sarif'
          upload-to-security: 'false'
          exit-code: '1'

      - name: 📊 Security summary
        run: |
          echo "## 🔒 Security Scan Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Scan Type | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Bandit (Code Security) | ✅ Completed |" >> $GITHUB_STEP_SUMMARY
          echo "| Safety (Dependencies) | ✅ Completed |" >> $GITHUB_STEP_SUMMARY

          if [[ "${{ env.IMAGE_BUILT }}" == "true" ]]; then
            echo "| Trivy (Container Security) | ✅ Completed |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| Trivy (Container Security) | ⚠️ Skipped (no Dockerfile) |" >> $GITHUB_STEP_SUMMARY
          fi

  # Job 7: Test summary
  test-summary:
    name: Test Summary
    runs-on: self-hosted
    needs: [test-unit]
    if: always()

    steps:
      - name: Generate summary
        run: |
          echo "## Test Execution Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Unit Tests | ${{ needs.test-unit.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [[ "${{ needs.test-unit.result }}" == "success" ]]; then
            echo -e "${GREEN}✅ All tests passed!" >> $GITHUB_STEP_SUMMARY
          else
            echo -e "${RED}❌ Unit tests failed" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Checkout code
        uses: actions/checkout@v6
        with:
          sparse-checkout: |
            pyproject.toml
          sparse-checkout-cone-mode: false

      - name: 🏷️ Update PR Badge Gist
        if: ${{ !(github.event_name == 'pull_request' && github.actor == 'dependabot[bot]') }}
        uses: GreenNexus-Core/gh-actions/.github/actions/update-badge-gist@main
        with:
          gist_id: ${{ vars.BADGE_GIST_ID }}
          gist_token: ${{ secrets.BADGE_GIST_TOKEN }}
          badge_type: pr
          build_status: ${{ needs.test-unit.result }}
