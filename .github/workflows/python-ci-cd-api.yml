
name: API Pipeline 🚀
run-name: "${{ github.actor }} - ${{ inputs.build_mode }} - ${{ inputs.environment }} - ${{ github.run_id }}"

on:
  workflow_call:
    inputs:
      build_mode:
        description: "Which action do you want?"
        required: false
        default: Build
        type: string
      environment:
        type: string
        description: 'Environment to run the workflow'
        required: true
      python_version:
        type: string
        description: 'Python version to use in the workflow'
        required: false
        default: '3.14'
      project_name:
        type: string
        description: 'Project name'
        required: true
      image_name:
        type: string
        description: 'Docker image name'
        required: true
      env_map_file:
        description: 'Env/Secret mapping file'
        required: false
        type: string
        default: ''
      main_file:
        type: string
        description:
        required: false
        default: 'main.py'
      sparse_checkout:
        description: 'Sparse checkout pattern'
        required: false
        type: string
        default: 'src/'
      git_leaks:
        description: 'Enable Gitleaks security scan'
        required: false
        type: boolean
        default: true
      app_dir:
        description: 'Application directory (app or src)'
        required: false
        type: string
        default: 'src'
      coverage_threshold:
        description: 'Minimum coverage percentage required (0-100)'
        required: false
        type: number
        default: 0
      health_check_path:
        description: 'HTTP path used to verify app readiness after deploy'
        required: false
        type: string
        default: '/health'
      deploy_poll_max_attempts:
        description: 'Max polling attempts to wait for ACA revision readiness'
        required: false
        type: number
        default: 30
      deploy_poll_interval_seconds:
        description: 'Seconds between polling attempts for ACA readiness checks'
        required: false
        type: number
        default: 20

env:
  # Colors for output
  RED: '\033[0;31m'
  GREEN: '\033[0;32m'
  YELLOW: '\033[0;33m'
  BLUE: '\033[0;34m'
  RESET: '\033[0m'
  BOLD: '\033[1m'
  BOLD_GREEN: '\033[1;32m'
  BOLD_YELLOW: '\033[1;33m'

  # Container Registry
  registry: 'ghcr.io/greennexus-core'
  registryUser: felipementel
  dockerfileFolder: 'docker'

  # Azure Configuration (use Variables)
  azureRG: ${{ vars.AZURE_RG || 'rg-greennexus' }}
  azureACA: ${{ vars.AZURE_ACA || 'ca-green-nexus' }}
  azureACAE: ${{ vars.AZURE_ACAE || 'cae-green-nexus' }}

  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build:
    name: Build Python FastAPI
    environment: ${{ inputs.environment }}
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}
      cancel-in-progress: true
    outputs:
      tag-version: ${{ steps.get-version.outputs.TAG }}
      now: ${{ steps.get-env.outputs.NOW }}
    runs-on: self-hosted
    timeout-minutes: 20
    permissions:
      contents: read
      security-events: write

    steps:

      - name: 🏷️ Set Badge to Running
        if: ${{ github.ref == 'refs/heads/main' }}
        uses: GreenNexus-Core/gh-actions/.github/actions/update-badge-gist@main
        with:
          gist_id: ${{ vars.BADGE_GIST_ID }}
          gist_token: ${{ secrets.BADGE_GIST_TOKEN }}
          badge_type: cicd
          build_status: running

      - name: 🧭 Get Environment
        id: get-env
        run: |
          echo -e "${GREEN} ⚠️ Environment ${{ inputs.environment }}"
          echo "NOW=$(date +'%Y-%m-%dT%H:%M:%S')" >> $GITHUB_OUTPUT

      - name: 📥 Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.ref }}
          fetch-depth: 0
          sparse-checkout: |
            ${{ inputs.sparse_checkout }}
            pyproject.toml
            infra/aca.envmap
            tests/
          sparse-checkout-cone-mode: false

      - name: 🧱📤 Git Leaks
        if: ${{ inputs.git_leaks && !(github.event_name == 'pull_request' && github.actor == 'dependabot[bot]') }}
        uses: GreenNexus-Core/gh-actions/.github/actions/git-leaks@main
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          gitleaks-license: ${{ secrets.GITLEAKS_LICENSE }}
          enable-summary: 'true'
          enable-upload-artifact: 'true'
          notify-user-list: '@felipementel'

      # Trivy no source/repo SAST scan (vulnerabilities, secrets, misconfigurations)
      - name: 🔎 Trivy - Filesystem Scan (vuln, secret, misconfig)
        uses: GreenNexus-Core/gh-actions/.github/actions/trivy-scan@main
        with:
          scan-type: 'fs'
          scan-ref: '${{ env.working_directory }}'
          scanners: 'vuln,misconfig,secret'
          format: 'github'
          severity: 'HIGH,CRITICAL'
          ignore-unfixed: true
          exit-code: '1'
          trivyignores: ${{ steps.check-trivyignore.outputs.path }}

      - name: 🔎 Trivy - license scan
        uses: GreenNexus-Core/gh-actions/.github/actions/trivy-scan@main
        with:
          scan-type: 'fs'
          scan-ref: '${{ env.working_directory }}'
          scanners: 'license'
          format: 'github'
          severity: 'MEDIUM,HIGH,CRITICAL'
          ignore-unfixed: true
          exit-code: '1'
          trivyignores: ${{ steps.check-trivyignore.outputs.path }}

      - name: 🏷️ Extract Application Version
        uses: GreenNexus-Core/gh-actions/.github/actions/python-get-version@main
        id: get-version
        with:
          environment: ${{ inputs.environment }}

      - name: 🐍 Set up Python ${{ inputs.python_version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ inputs.python_version }}
          cache: pip

      - name: ✅ Check Python version
        run: |
          python --version
          pip --version

      - name: 📦 Install dependencies
        env:
          GH_PACKAGES_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN }}
        run: |
          python -m pip install --upgrade pip
          git config --global url."https://${GH_PACKAGES_TOKEN}@github.com/".insteadOf "https://github.com/"
          python -m pip install -e ".[dev]"

      - name: ✅ Check dependencies
        run: |
          pip check

      - name: 🔍 Check for tests
        id: check-tests
        shell: bash
        run: |
          if find . -name "*test*.py" -o -name "test_*.py" | grep -q .; then
            echo "HAS_TESTS=true" >> "$GITHUB_OUTPUT"
            echo -e "✅${GREEN} Arquivos de teste encontrados."
          else
            echo "HAS_TESTS=false" >> "$GITHUB_OUTPUT"
            echo -e "⚠️${YELLOW} Nenhum arquivo de teste encontrado."
          fi

      - name: 🧪 Run Python tests
        if: ${{ steps.check-tests.outputs.HAS_TESTS == 'true' }}
        run: |
          # Install test dependencies if they exist
          if [ -f "tests/requirements-test.txt" ]; then
            pip install -r tests/requirements-test.txt
          fi

          # Install pytest packages
          pip install pytest pytest-cov pytest-mock pytest-asyncio anyio || true

          # Set testing environment
          export TESTING=1
          export DISABLE_SSL_VERIFY=true

          # Run unit tests only with coverage
          echo -e "🧪${GREEN} Running unit tests with coverage..."
          python -m pytest -v \
            --cov=${{ inputs.app_dir }} \
            --cov-report=html:tests/results/htmlcov \
            --cov-report=xml:tests/results/coverage.xml \
            --cov-report=term-missing \
            --cov-fail-under=${{ inputs.coverage_threshold }} \
            tests/ || echo -e "⚠️${YELLOW} Tests completed with warnings"

      - name: 📊 Upload coverage to Codecov
        if: ${{ steps.check-tests.outputs.HAS_TESTS == 'true' }}
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./tests/results/coverage.xml
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false

      - name: 🎯 Generate coverage badge
        if: ${{ steps.check-tests.outputs.HAS_TESTS == 'true' }}
        run: |
          # Extract coverage percentage from coverage.xml
          COVERAGE=$(python -c "
          import xml.etree.ElementTree as ET
          try:
            tree = ET.parse('tests/results/coverage.xml')
            root = tree.getroot()
            coverage = float(root.attrib['line-rate']) * 100
            print(f'{coverage:.1f}')
          except:
            print('0.0')
          ")

          echo "Coverage: ${COVERAGE}%"

          # Determine badge color
          if (( $(echo "$COVERAGE >= 90" | bc -l) )); then
            COLOR="brightgreen"
          elif (( $(echo "$COVERAGE >= 70" | bc -l) )); then
            COLOR="yellow"
          else
            COLOR="red"
          fi

          # Create badge URL
          BADGE_URL="https://img.shields.io/badge/coverage-${COVERAGE}%25-${COLOR}"
          echo -e "🛡️${GREEN} Badge URL: $BADGE_URL"

          # Create badge file
          echo "![Coverage](${BADGE_URL})" > coverage-badge.md
          echo "COVERAGE_PERCENTAGE=${COVERAGE}" >> $GITHUB_ENV
          echo "BADGE_COLOR=${COLOR}" >> $GITHUB_ENV

      - name: 🧪📤 Upload test coverage artifacts
        if: ${{ steps.check-tests.outputs.HAS_TESTS == 'true' }}
        uses: actions/upload-artifact@v7
        with:
          name: coverage-reports-${{ github.run_number }}
          path: |
            tests/results/htmlcov/
            tests/results/coverage.xml
            coverage-badge.md
          retention-days: 30

      - name: Code Quality
        uses: GreenNexus-Core/gh-actions/.github/actions/python-code-quality@main
        with:
          app_dir: ${{ inputs.app_dir }}

      - name: 🧾 Write to workflow job summary
        run: |
          SUMMARY='
          # 📦 Build Completed

          | Campo          | Valor |
          |----------------|-------|
          | Versão         | ${{ steps.get-version.outputs.TAG }} |
          | Data           | ${{ steps.get-env.outputs.NOW }} |
          | Python Version | ${{ inputs.python_version }} |
          | Environment    | ${{ inputs.environment }} |

          ## ✅ Build Status
          - ✅ Código Python validado
          - ✅ Dependências instaladas
          - ✅ Testes executados (se disponíveis)
          - ✅ Linting executado'
          echo "$SUMMARY" >> $GITHUB_STEP_SUMMARY

  check-image:
    name: Check if Docker image exists
    if: ${{ inputs.build_mode == 'Build + Deploy' }}
    environment: ${{ inputs.environment }}
    runs-on: self-hosted
    needs: build
    outputs:
      image-exists: ${{ steps.check-image-and-tag.outputs.IMAGE_EXISTS }}
    steps:
      - name: 🔐 Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GH_PACKAGES_TOKEN }}

      - name: 🔍 Check if image exists
        id: check-image-and-tag
        run: |
          IMAGE_TAG="${{ env.registry }}/${{ inputs.image_name }}:${{ needs.build.outputs.tag-version }}"
          echo "Checking existence of $IMAGE_TAG..."
          if docker manifest inspect "$IMAGE_TAG" > /dev/null 2>&1; then
            echo -e "✅ ${GREEN} Image exists in registry"
            echo "IMAGE_EXISTS=true" >> "$GITHUB_OUTPUT"
          else
            echo -e "🔍 ${RED} Image does not exist in registry"
            echo "IMAGE_EXISTS=false" >> "$GITHUB_OUTPUT"
          fi

  push-image:
    name: Build and Push Docker Image
    if: ${{ inputs.build_mode == 'Build + Deploy' && needs.check-image.outputs.image-exists == 'false' }}
    environment: ${{ inputs.environment }}
    needs: [build, check-image]
    runs-on: self-hosted
    permissions:
      packages: write
      contents: write

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: 🏗️ Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: 🏗️ Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
        with:
          version: latest
          platforms: linux/amd64,linux/arm64

      - name: 🔐 Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GH_PACKAGES_TOKEN }}

      - name: 🏷️ Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: |
            ${{ env.registry }}/${{ inputs.image_name }}

      - name: 🐳 Build Docker image (without push)
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ env.dockerfileFolder }}/Dockerfile
          push: false
          load: true
          platforms: linux/amd64
          secrets: |
            GITHUB_TOKEN=${{ secrets.GH_PACKAGES_TOKEN }}
          tags: |
            ${{ env.registry }}/${{ inputs.image_name }}:${{ needs.build.outputs.tag-version }}
          labels: |
            ${{ steps.meta.outputs.labels }}
            org.opencontainers.image.version=${{ needs.build.outputs.tag-version }}
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: 🔍 Scan Docker image for vulnerabilities
        uses: GreenNexus-Core/gh-actions/.github/actions/trivy-scan@main
        with:
          image-ref: ${{ env.registry }}/${{ inputs.image_name }}:${{ needs.build.outputs.tag-version }}
          severity: 'CRITICAL,HIGH'
          format: 'sarif'
          output-file: 'trivy-results.sarif'
          upload-to-security: 'true'
          scan-type: 'image'
          exit-code: '1'

      - name: 🚀 Push Docker image (after security scan passed)
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ env.dockerfileFolder }}/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          secrets: |
            GITHUB_TOKEN=${{ secrets.GH_PACKAGES_TOKEN }}
          tags: |
            ${{ env.registry }}/${{ inputs.image_name }}:${{ needs.build.outputs.tag-version }}
          labels: |
            ${{ steps.meta.outputs.labels }}
            org.opencontainers.image.version=${{ needs.build.outputs.tag-version }}
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Generate git tag
        run: |
          echo "TAG_NAME=v${{ needs.build.outputs.tag-version }}"
          git tag -a v${{ needs.build.outputs.tag-version }} -m "Release v${{ needs.build.outputs.tag-version }} at $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
          git push origin v${{ needs.build.outputs.tag-version }}

      - name: 📝 Write image summary
        run: |
          SUMMARY='
          # 🐳 Docker Image Published

          | Campo | Valor |
          |-------|-------|
          | Image | ${{ env.registry }}/${{ inputs.image_name }} |
          | Tag | ${{ needs.build.outputs.tag-version }} |
          | Registry | GitHub Container Registry (GHCR) |
          | Platforms | linux/amd64, linux/arm64 |
          | Security Scan | ✅ Passed (no CRITICAL/HIGH vulnerabilities) |
          | Status | ✅ Publicada com sucesso |'
          echo "$SUMMARY" >> $GITHUB_STEP_SUMMARY

  deploy-aca:
    name: Deploy to Azure Container Apps
    if: ${{ inputs.build_mode == 'Build + Deploy' }}
    environment: ${{ inputs.environment }}
    needs: [build, push-image]
    runs-on: self-hosted
    outputs:
      azure-aca-name: ${{ steps.naming.outputs.AZURE_ACA_NAME }}
      azure-acae-name: ${{ steps.naming.outputs.AZURE_ACAE_NAME }}
      azure-rg-name: ${{ steps.naming.outputs.AZURE_RG_NAME }}
    permissions:
      contents: read
      packages: read

    steps:
      - name: 🔐 Azure CLI Login
        uses: azure/login@v3
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: 🧾 Compute Azure Container Apps names from repo
        id: naming
        shell: bash
        run: |
          REPO_NAME="${{ github.event.repository.name }}"
          ENV_INPUT="$(echo "${{ inputs.environment }}" | tr '[:upper:]' '[:lower:]')"

          case "$ENV_INPUT" in
            dev|development)
              ENV_SUFFIX="dev"
              ;;
            hml|homolog|homologacao|staging)
              ENV_SUFFIX="hml"
              ;;
            prd|prod|production)
              ENV_SUFFIX="prd"
              ;;
            *)
              ENV_SUFFIX="$ENV_INPUT"
              ;;
          esac

          # repo slug: lowercase, keep [a-z0-9-]
          SLUG="$(echo "$REPO_NAME" | tr '[:upper:]' '[:lower:]' | sed -E 's/[^a-z0-9-]+/-/g; s/^-+//; s/-+$//')"

          # strip common prefixes/suffixes to get a short app name
          APP="$SLUG"
          APP="$(echo "$APP" | sed -E 's/^gn-api-//; s/^gn-//; s/-service$//; s/-api$//')"
          APP="$(echo "$APP" | sed -E 's/^-+//; s/-+$//')"

          RG_BASE="${{ env.azureRG }}"

          if [ "$ENV_SUFFIX" = "prd" ]; then
            ACA_NAME="ca-${APP}"
            ACAE_NAME="cae-greennexus"
            RG_NAME="$RG_BASE"
          else
            ACA_NAME="ca-${APP}-${ENV_SUFFIX}"
            ACAE_NAME="cae-greennexus-${ENV_SUFFIX}"
            RG_NAME="${RG_BASE}-${ENV_SUFFIX}"
          fi

          echo "AZURE_ACA_NAME=$ACA_NAME" >> $GITHUB_OUTPUT
          echo "AZURE_ACAE_NAME=$ACAE_NAME" >> $GITHUB_OUTPUT
          echo "AZURE_RG_NAME=$RG_NAME" >> $GITHUB_OUTPUT

          echo "ACA_NAME=$ACA_NAME" >> $GITHUB_OUTPUT
          echo "ACAE_NAME=$ACAE_NAME" >> $GITHUB_OUTPUT
          echo "ENV_SUFFIX=$ENV_SUFFIX" >> $GITHUB_OUTPUT
          echo "RG_NAME=$RG_NAME" >> $GITHUB_OUTPUT

      # - name: 🔐 Set registry in Azure Container App
      #   run: |
      #     az containerapp registry set \
      #       --name ${{ env.AZURE_ACA_NAME }} \
      #       --resource-group ${{ env.AZURE_RG_NAME }} \
      #       --server ghcr.io \
      #       --username ${{ github.actor }} \
      #       --password ${{ secrets.GH_PACKAGES_TOKEN }}

      # - name: 🔐 Set secrets in Azure Container App
      #   run: |
      #     az containerapp secret set \
      #       --name ${{ env.azureACA }} \
      #       --resource-group ${{ env.azureRG }} \
      #       --secrets \
      #         sql-server="${{ secrets.SQL_SERVER }}" \
      #         sql-database="${{ secrets.SQL_DATABASE }}" \
      #         sql-username="${{ secrets.SQL_USERNAME }}" \
      #         sql-password="${{ secrets.SQL_PASSWORD }}" \
      #         appinsights-connection-string="${{ secrets.APPINSIGHTS_CONNECTION_STRING }}" \
      #         appinsights-api-key="${{ secrets.APPINSIGHTS_API_KEY }}"

      # - name: 🚀 Deploy to Azure Container App
      #   uses: azure/container-apps-deploy-action@v2
      #   with:
      #     containerAppName: "${{ github.event.repository.name }}"
      #     containerAppEnvironment: ${{ env.AZURE_ACAE_NAME }}
      #     registryUrl: ghcr.io
      #     imageToDeploy: ${{ env.registry }}/${{ inputs.image_name }}:${{ needs.build.outputs.tag-version }}
      #     resourceGroup: ${{ env.AZURE_RG_NAME }}
      #     registryUsername: ${{ env.registryUser }}
      #     registryPassword: ${{ secrets.GH_PACKAGES_TOKEN }}
      #     targetPort: 8080
      #     location: brazilsouth
      #     environmentVariables: >
      #       SQL_SERVER=secretref:sql-server
      #       SQL_DATABASE=secretref:sql-database
      #       SQL_USERNAME=secretref:sql-username
      #       SQL_PASSWORD=secretref:sql-password
      #       APPINSIGHTS_CONNECTION_STRING=secretref:appinsights-connection-string
      #       APPINSIGHTS_API_KEY=secretref:appinsights-api-key
      #       DEBUG=${{ vars.DEBUG || 'false' }}
      #       HOST=${{ vars.HOST || '0.0.0.0' }}
      #       PORT=${{ vars.PORT || '8080' }}
      #       ENVIRONMENT=${{ inputs.environment }}

      - name: 🚀 Update Azure Container App image (no config changes)
        shell: bash
        run: |
          set -euo pipefail
          echo "Updating image for: ${{ steps.naming.outputs.AZURE_ACA_NAME }} in RG: ${{ steps.naming.outputs.AZURE_RG_NAME }}"
          echo "Image: ${{ env.registry }}/${{ inputs.image_name }}:${{ needs.build.outputs.tag-version }}"

          az containerapp update \
            --name "${{ steps.naming.outputs.AZURE_ACA_NAME }}" \
            --resource-group "${{ steps.naming.outputs.AZURE_RG_NAME }}" \
            --image "${{ env.registry }}/${{ inputs.image_name }}:${{ needs.build.outputs.tag-version }}"

      - name: ⏱️ Wait for new revision with expected image
        shell: bash
        run: |
          set -euo pipefail

          EXPECTED_IMAGE="${{ env.registry }}/${{ inputs.image_name }}:${{ needs.build.outputs.tag-version }}"
          MAX_ATTEMPTS=${{ inputs.deploy_poll_max_attempts }}
          INTERVAL=${{ inputs.deploy_poll_interval_seconds }}

          echo -e "${BLUE} Expected image: ${EXPECTED_IMAGE}"
          echo -e "${BLUE} Polling for revision readiness (attempts=${MAX_ATTEMPTS}, interval=${INTERVAL}s)"

          READY_REV=""
          READY_IMAGE=""
          RUNNING_STATUS=""
          LATEST_REV=""

          for attempt in $(seq 1 "${MAX_ATTEMPTS}"); do
            RUNNING_STATUS=$(az containerapp show \
              --name "${{ steps.naming.outputs.AZURE_ACA_NAME }}" \
              --resource-group "${{ steps.naming.outputs.AZURE_RG_NAME }}" \
              --query "properties.runningStatus" \
              --output tsv 2>/dev/null || true)

            LATEST_REV=$(az containerapp show \
              --name "${{ steps.naming.outputs.AZURE_ACA_NAME }}" \
              --resource-group "${{ steps.naming.outputs.AZURE_RG_NAME }}" \
              --query "properties.latestRevisionName" \
              --output tsv 2>/dev/null || true)

            READY_REV=$(az containerapp show \
              --name "${{ steps.naming.outputs.AZURE_ACA_NAME }}" \
              --resource-group "${{ steps.naming.outputs.AZURE_RG_NAME }}" \
              --query "properties.latestReadyRevisionName" \
              --output tsv 2>/dev/null || true)

            READY_IMAGE=""
            if [ -n "${READY_REV}" ] && [ "${READY_REV}" != "None" ]; then
              READY_IMAGE=$(az containerapp revision list \
                --name "${{ steps.naming.outputs.AZURE_ACA_NAME }}" \
                --resource-group "${{ steps.naming.outputs.AZURE_RG_NAME }}" \
                --query "[?name=='${READY_REV}'].properties.template.containers[0].image | [0]" \
                --output tsv 2>/dev/null || true)
            fi

            echo -e "${BLUE} Attempt ${attempt}/${MAX_ATTEMPTS} => running=${RUNNING_STATUS} latest=${LATEST_REV} ready=${READY_REV} readyImage=${READY_IMAGE}"

            if [ "${RUNNING_STATUS}" = "Running" ] && [ -n "${LATEST_REV}" ] && [ "${LATEST_REV}" = "${READY_REV}" ] && [ "${READY_IMAGE}" = "${EXPECTED_IMAGE}" ]; then
              echo -e "${GREEN} ✅ Revision is ready and running expected image"
              break
            fi

            if [ "${attempt}" -eq "${MAX_ATTEMPTS}" ]; then
              echo -e "${RED} ❌ Timed out waiting for revision to become ready with expected image"
              echo -e "${BLUE} Diagnostics:"
              az containerapp revision list \
                --name "${{ steps.naming.outputs.AZURE_ACA_NAME }}" \
                --resource-group "${{ steps.naming.outputs.AZURE_RG_NAME }}" \
                --query "[].{name:name,active:properties.active,createdTime:properties.createdTime,provisioningState:properties.provisioningState,runningState:properties.runningState,image:properties.template.containers[0].image}" \
                --output table || true
              exit 1
            fi

            sleep "${INTERVAL}"
          done

      - name: 🌐 Poll app endpoint after deploy
        shell: bash
        run: |
          set -euo pipefail

          FQDN=$(az containerapp show \
            --name "${{ steps.naming.outputs.AZURE_ACA_NAME }}" \
            --resource-group "${{ steps.naming.outputs.AZURE_RG_NAME }}" \
            --query "properties.configuration.ingress.fqdn" \
            --output tsv)

          HEALTH_PATH="${{ inputs.health_check_path }}"
          MAX_ATTEMPTS=${{ inputs.deploy_poll_max_attempts }}
          INTERVAL=${{ inputs.deploy_poll_interval_seconds }}
          URL="https://${FQDN}${HEALTH_PATH}"

          echo -e "${BLUE} Polling URL: ${URL}"

          for attempt in $(seq 1 "${MAX_ATTEMPTS}"); do
            HTTP_CODE=$(curl -k -sS -o /dev/null -w "%{http_code}" "${URL}" || echo "000")
            echo -e "${BLUE} Attempt ${attempt}/${MAX_ATTEMPTS} => HTTP ${HTTP_CODE}"

            if [[ "${HTTP_CODE}" =~ ^2[0-9][0-9]$|^3[0-9][0-9]$|^401$|^403$|^404$ ]]; then
              echo -e "${GREEN} ✅ Endpoint responded (HTTP ${HTTP_CODE})"
              break
            fi

            if [ "${attempt}" -eq "${MAX_ATTEMPTS}" ]; then
              echo -e "${RED} ❌ Endpoint did not become reachable in time"
              exit 1
            fi

            sleep "${INTERVAL}"
          done

      # NOTE:
      # We intentionally avoid azure/container-apps-deploy-action here because it can overwrite
      # the Container App template (env vars, secrets, ingress) managed by Terraform, which may
      # leave the app stuck in 'Activating'. This step updates only the container image.

      - name: 📊 Container App Details
        id: aca-details
        run: |
          FQDN=$(az containerapp show \
            --name "${{ steps.naming.outputs.AZURE_ACA_NAME }}" \
            --resource-group "${{ steps.naming.outputs.AZURE_RG_NAME }}" \
            --query "properties.configuration.ingress.fqdn" \
            --output tsv)

          STATE=$(az containerapp show \
            --name "${{ steps.naming.outputs.AZURE_ACA_NAME }}" \
            --resource-group "${{ steps.naming.outputs.AZURE_RG_NAME }}" \
            --query "properties.runningStatus" \
            --output tsv)

          echo "FQDN=$FQDN" >> $GITHUB_OUTPUT
          echo "STATE=$STATE" >> $GITHUB_OUTPUT

      - name: 📝 Write deployment summary
        run: |
          SUMMARY='
          # 🚀 Deploy to Azure Container App

          | Campo | Valor |
          |-------|-------|
          | Versão | ${{ needs.build.outputs.tag-version }} |
          | Data | ${{ needs.build.outputs.now }} |
          | Environment | ${{ inputs.environment }} |
          | Container App | ${{ steps.naming.outputs.AZURE_ACA_NAME }} |
          | Container App Environment | ${{ steps.naming.outputs.AZURE_ACAE_NAME }} |
          | Resource Group | ${{ steps.naming.outputs.AZURE_RG_NAME }} |
          | FQDN | ${{ steps.aca-details.outputs.FQDN }} |
          | Estado | ${{ steps.aca-details.outputs.STATE }} |
          | URL da API | https://${{ steps.aca-details.outputs.FQDN }} |

          ## 🔗 Links Úteis
          - **Swagger UI**: https://${{ steps.aca-details.outputs.FQDN }}/docs
          - **ReDoc**: https://${{ steps.aca-details.outputs.FQDN }}/redoc
          - **Health Check**: https://${{ steps.aca-details.outputs.FQDN }}/health

          ## ✅ Deploy Status
          - ✅ Imagem Docker publicada no GHCR
          - ✅ Secrets configurados no Azure Container App
          - ✅ Deploy realizado com sucesso
          - ✅ Aplicação disponível na URL acima'
          echo "$SUMMARY" >> $GITHUB_STEP_SUMMARY

  publish:
    name: Publish Final Summary
    if: ${{ inputs.build_mode == 'Build + Deploy' }}
    needs: [build, push-image, deploy-aca]
    environment: ${{ inputs.environment }}
    runs-on: self-hosted
    steps:
      - name: 📝 Final Summary
        run: |
          SUMMARY='
          # 🎉 Pipeline Executada com Sucesso!

          ## 📋 Resumo da Execução
          | Campo | Valor |
          |-------|-------|
          | 🏷️ Versão | ${{ needs.build.outputs.tag-version }} |
          | 📅 Data/Hora | ${{ needs.build.outputs.now }} |
          | 🌍 Environment | ${{ inputs.environment }} |
          | 📦 Serviço | ${{ needs.deploy-aca.outputs.azure-aca-name }} |
          | 🐳 Imagem Docker | ${{ env.registry }}/${{ inputs.image_name }}:${{ needs.build.outputs.tag-version }} |
          | ☁️ Azure Container App | ${{ needs.deploy-aca.outputs.azure-aca-name }} |
          | ☁️ Container App Environment | ${{ needs.deploy-aca.outputs.azure-acae-name }} |
          | 🌐 Resource Group | ${{ needs.deploy-aca.outputs.azure-rg-name }} |

          ## ✅ Etapas Concluídas
          1. ✅ **Build**: Código Python validado e dependências instaladas
          2. ✅ **Tests**: Testes executados com cobertura
          3. ✅ **Security**: GitLeaks scan realizado
          4. ✅ **Docker**: Imagem criada e publicada no GHCR
          5. ✅ **Secrets**: Configurados via Azure Key Vault
          6. ✅ **Deploy**: Aplicação implantada no Azure Container Apps

          ## 🔐 Configuração de Secrets
          - Secrets carregados do **Azure Key Vault**
          - Variáveis públicas aplicadas do **GitHub Variables**
          - Mapeamento definido em: `infra/aca.envmap`

          ## 🔗 Próximos Passos
          - Verifique os logs no Azure Portal
          - Teste os endpoints da API
          - Monitore métricas e performance

          ---
          **${{ inputs.project_name }}** está pronto para uso! 🚀'
          echo "$SUMMARY" >> $GITHUB_STEP_SUMMARY

  notify-image-exists:
    name: Notify Image Already Exists
    if: ${{ inputs.build_mode == 'Build + Deploy' && needs.check-image.outputs.image-exists == 'true'}}
    needs: [build, check-image]
    environment: ${{ inputs.environment }}
    runs-on: self-hosted
    steps:
      - name: 📝 Notify existing image
        run: |
          SUMMARY='
          # ⚠️ Imagem Já Existe

          A imagem Docker com a tag **${{ needs.build.outputs.tag-version }}** já existe no registry.

          | Campo | Valor |
          |-------|-------|
          | Tag | ${{ needs.build.outputs.tag-version }} |
          | Registry | ${{ env.registry }}/${{ inputs.image_name }} |
          | Status | ⚠️ Imagem já existe |

          **Ações puladas:**
          - ⏭️ Build da imagem Docker
          - ⏭️ Push para o registry
          - ⏭️ Deploy no Azure Container Apps

          Para forçar um novo build, altere a versão ou delete a imagem existente.'
          echo "$SUMMARY" >> $GITHUB_STEP_SUMMARY

  update-cicd-badge:
    name: Update CI/CD Badge
    if: ${{ always() && github.ref == 'refs/heads/main' }}
    needs: [build, publish, notify-image-exists]
    runs-on: self-hosted
    steps:
      - name: 📥 Checkout (pyproject.toml only)
        uses: actions/checkout@v6
        with:
          sparse-checkout: |
            pyproject.toml
          sparse-checkout-cone-mode: false

      - name: 🔍 Determine pipeline result
        id: result
        shell: bash
        run: |
          BUILD="${{ needs.build.result }}"
          PUBLISH="${{ needs.publish.result }}"
          NOTIFY="${{ needs.notify-image-exists.result }}"

          echo "build=${BUILD} publish=${PUBLISH} notify=${NOTIFY}"

          if [[ "$BUILD" == "failure" || "$PUBLISH" == "failure" || "$NOTIFY" == "failure" ]]; then
            echo "status=failure" >> $GITHUB_OUTPUT
          elif [[ "$BUILD" == "cancelled" || "$PUBLISH" == "cancelled" || "$NOTIFY" == "cancelled" ]]; then
            echo "status=cancelled" >> $GITHUB_OUTPUT
          else
            echo "status=success" >> $GITHUB_OUTPUT
          fi

      - name: 🏷️ Update Badge Gist
        uses: GreenNexus-Core/gh-actions/.github/actions/update-badge-gist@main
        with:
          gist_id: ${{ vars.BADGE_GIST_ID }}
          gist_token: ${{ secrets.BADGE_GIST_TOKEN }}
          badge_type: cicd
          build_status: ${{ steps.result.outputs.status }}
          version_file: pyproject.toml
