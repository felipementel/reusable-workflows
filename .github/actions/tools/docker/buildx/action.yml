name: Docker Buildx Build
description: Composite action to build Docker images using buildx (supports multi-platform and tar export)

inputs:
  registry:
    description: 'Container registry URL (e.g., ghcr.io, docker.io)'
    required: false
    default: 'ghcr.io'
  registry-username:
    description: 'Username for registry authentication'
    required: true
  image-name:
    description: 'Docker image name (without registry prefix)'
    required: true
  tag-version:
    description: 'Version tag for the image'
    required: true
  dockerfile:
    description: 'Path to the Dockerfile'
    required: true
  context:
    description: 'Docker build context'
    required: false
    default: '.'
  platforms:
    description: 'Target platforms for build (comma-separated)'
    required: false
    default: 'linux/amd64,linux/arm64'
  push:
    description: 'Whether to push the image after build'
    required: false
    default: 'true'
  output-tar:
    description: 'Path to export the image as a tar file (e.g., ./my-image.tar). When set, runs docker buildx build --output=type=docker,dest=<path>'
    required: false
    default: ''

runs:
  using: 'composite'
  steps:

    - name: 🐳 Extract metadata (tags, labels) for Docker
      id: meta
      uses: ./.github/actions/_wrapper/docker/metadata-action
      with:
        images: |
          ${{ inputs.registry }}/${{ inputs.registry-username }}/${{ inputs.image-name }}

    - name: 🐳 Build and push
      if: inputs.output-tar == ''
      uses: ./.github/actions/_wrapper/docker/build-push-action
      with:
        context: ${{ inputs.context }}
        file: ${{ inputs.dockerfile }}
        platforms: ${{ inputs.platforms }}
        push: ${{ inputs.push }}
        tags: |
          ${{ inputs.registry }}/${{ inputs.registry-username }}/${{ inputs.image-name }}:latest
          ${{ inputs.registry }}/${{ inputs.registry-username }}/${{ inputs.image-name }}:${{ inputs.tag-version }}
        labels: ${{ steps.meta.outputs.labels }}

    - name: 🐳 Build and export to tar
      if: inputs.output-tar != ''
      shell: bash
      run: |
        docker buildx build \
          -f ${{ inputs.dockerfile }} \
          -t ${{ inputs.registry }}/${{ inputs.registry-username }}/${{ inputs.image-name }}:${{ inputs.tag-version }} \
          --output=type=docker,dest=${{ inputs.output-tar }} \
          ${{ inputs.context }}

    - name: 📊 Summary
      shell: bash
      run: |
        echo "### 🐳 Docker Build" >> "$GITHUB_STEP_SUMMARY"
        echo "" >> "$GITHUB_STEP_SUMMARY"
        echo "- **Image:** \`${{ inputs.registry }}/${{ inputs.registry-username }}/${{ inputs.image-name }}\`" >> "$GITHUB_STEP_SUMMARY"
        echo "- **Tags:** \`latest\`, \`${{ inputs.tag-version }}\`" >> "$GITHUB_STEP_SUMMARY"
        echo "- **Dockerfile:** \`${{ inputs.dockerfile }}\`" >> "$GITHUB_STEP_SUMMARY"
        echo "- **Platforms:** \`${{ inputs.platforms }}\`" >> "$GITHUB_STEP_SUMMARY"
        if [ -n "${{ inputs.output-tar }}" ]; then
          echo "- **Tar export:** \`${{ inputs.output-tar }}\`" >> "$GITHUB_STEP_SUMMARY"
        fi
