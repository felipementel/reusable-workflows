name: Docker Setup
description: Composite action to set up Docker environment with QEMU and Buildx for multi-platform builds

inputs:
  platforms:
    description: 'Target platforms for QEMU emulation (comma-separated)'
    required: false
    default: 'linux/amd64,linux/arm64'

runs:
  using: 'composite'
  steps:
    - name: 🐳 Set up QEMU
      uses: docker/setup-qemu-action@v3
      with:
        platforms: ${{ inputs.platforms }}

    - name: 🐳 Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
      with:
        version: latest
