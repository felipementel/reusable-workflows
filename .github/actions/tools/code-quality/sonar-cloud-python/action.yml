name: 'SonarCloud Analysis - Python'
description: 'Sets up and runs SonarCloud analysis for Python projects with or without test coverage.'

inputs:
  has-tests:
    description: 'Whether tests were run and coverage should be included (true/false)'
    required: true
    default: 'false'
  sonar-project-key:
    description: 'SonarCloud project key'
    required: true
  sonar-organization:
    description: 'SonarCloud organization'
    required: true
  sonar-token:
    description: 'SonarCloud token'
    required: true
  github-token:
    description: 'GitHub token'
    required: true
  sonar-exclusions:
    description: 'Paths to exclude from Sonar analysis (comma separated)'
    required: false
    default: ''
  app-dir:
    description: 'Application source directory to analyze'
    required: false
    default: 'src'
  coverage-report:
    description: 'Path to the coverage XML report generated by pytest-cov'
    required: false
    default: 'tests/results/coverage.xml'

runs:
  using: 'composite'
  steps:
    - name: 📸 SonarCloud Analysis (Test ✅, Sonar ✅)
      if: ${{ inputs.has-tests == 'true' }}
      uses: felipementel/gh-actions/.github/actions/_wrapper/sonar/sonarcloud-github-action
      env:
        GITHUB_TOKEN: ${{ inputs.github-token }}
        SONAR_TOKEN: ${{ inputs.sonar-token }}
      with:
        args: >
          -Dsonar.projectKey=${{ inputs.sonar-project-key }}
          -Dsonar.organization=${{ inputs.sonar-organization }}
          -Dsonar.sources=${{ inputs.app-dir }}
          -Dsonar.python.coverage.reportPaths=${{ inputs.coverage-report }}
          -Dsonar.exclusions=${{ inputs.sonar-exclusions }}

    - name: 📸 SonarCloud Analysis (Test ⛔, Sonar ✅)
      if: ${{ inputs.has-tests != 'true' }}
      uses: felipementel/gh-actions/.github/actions/_wrapper/sonar/sonarcloud-github-action
      env:
        GITHUB_TOKEN: ${{ inputs.github-token }}
        SONAR_TOKEN: ${{ inputs.sonar-token }}
      with:
        args: >
          -Dsonar.projectKey=${{ inputs.sonar-project-key }}
          -Dsonar.organization=${{ inputs.sonar-organization }}
          -Dsonar.sources=${{ inputs.app-dir }}
          -Dsonar.exclusions=${{ inputs.sonar-exclusions }}
