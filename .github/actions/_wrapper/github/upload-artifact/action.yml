name: 'Upload Artifact (Wrapper)'
description: 'Wrapper composite action for actions/upload-artifact'

inputs:
  name:
    description: 'Artifact name'
    required: false
    default: 'artifact'
  path:
    description: 'A file, directory or wildcard pattern that describes what to upload'
    required: true
  if-no-files-found:
    description: 'Behavior when no files are found: warn | error | ignore'
    required: false
    default: 'warn'
  retention-days:
    description: 'Duration in days before artifact expires (0 = repository default; max 90)'
    required: false
    default: '0'
  compression-level:
    description: 'Zlib compression level 0–9 (0 = no compression, 6 = default, 9 = best)'
    required: false
    default: '6'
  overwrite:
    description: 'Delete existing artifact with the same name before uploading'
    required: false
    default: 'false'
  include-hidden-files:
    description: 'Include hidden files in the artifact'
    required: false
    default: 'false'
  archive:
    description: 'Archive (zip) the artifact before uploading. When false, only a single file can be uploaded'
    required: false
    default: 'true'

outputs:
  artifact-id:
    description: 'Unique identifier of the uploaded artifact'
    value: ${{ steps.upload.outputs.artifact-id }}
  artifact-url:
    description: 'Download URL for the uploaded artifact (requires authentication)'
    value: ${{ steps.upload.outputs.artifact-url }}
  artifact-digest:
    description: 'SHA-256 digest of the uploaded artifact'
    value: ${{ steps.upload.outputs.artifact-digest }}

runs:
  using: 'composite'
  steps:
    - name: 📦 Upload artifact
      id: upload
      uses: actions/upload-artifact@v7
      with:
        name: ${{ inputs.name }}
        path: ${{ inputs.path }}
        if-no-files-found: ${{ inputs.if-no-files-found }}
        retention-days: ${{ inputs.retention-days }}
        compression-level: ${{ inputs.compression-level }}
        overwrite: ${{ inputs.overwrite }}
        include-hidden-files: ${{ inputs.include-hidden-files }}
        archive: ${{ inputs.archive }}
