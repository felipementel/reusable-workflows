name: 'Docker Login Action (Wrapper)'
description: 'Wrapper composite action for docker/login-action. Update the version only here.'

inputs:
  registry:
    description: 'Server address of Docker registry. If not set then will default to Docker Hub'
    required: false
  username:
    description: 'Username used to log against the Docker registry'
    required: false
  password:
    description: 'Password or personal access token used to log against the Docker registry'
    required: false
  ecr:
    description: 'Specifies whether the given registry is ECR (auto, true or false)'
    required: false
  scope:
    description: 'Specifies the scope for the GitHub token credentials'
    required: false
  logout:
    description: 'Log out from the Docker registry at the end of a job'
    required: false
    default: 'true'

runs:
  using: 'composite'
  steps:
    - name: 🐳 Log in to Docker registry
      id: login
      uses: docker/login-action@v4
      with:
        registry: ${{ inputs.registry }}
        username: ${{ inputs.username }}
        password: ${{ inputs.password }}
        ecr: ${{ inputs.ecr }}
        scope: ${{ inputs.scope }}
        logout: ${{ inputs.logout }}
