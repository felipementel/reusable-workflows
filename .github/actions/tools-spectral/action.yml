name: 'Spectral OpenAPI Lint'
description: 'Runs Spectral lint with DevOps Linter and OWASP rulesets against OpenAPI specs and uploads results.'

inputs:
  openAPIFolder:
    description: 'Path to the folder containing OpenAPI specification files inside the build output'
    required: true
  node-version:
    description: 'Node.js version'
    required: false
    default: '22'
  projectBaseDir:
    description: 'Path to project base directory'
    required: true
  mainProject:
    description: 'The main project name'
    required: true
  needs-build:
    description: 'Whether to run dotnet restore + build before linting (true/false)'
    required: false
    default: 'true'

runs:
  using: 'composite'
  steps:
    - name: 🍵 Restore dependencies
      if: ${{ inputs.needs-build == 'true' }}
      shell: bash
      run: |
        dotnet restore \
          ${{ inputs.projectBaseDir }}/${{ inputs.mainProject }}/${{ inputs.mainProject }}.csproj
        dotnet build \
          ${{ inputs.projectBaseDir }}/${{ inputs.mainProject }}/${{ inputs.mainProject }}.csproj \
          --no-restore \
          --output ./output_build

    - name: 🎗️ Setup Node.js ${{ inputs.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node-version }}

    - name: 🎗️ Install Spectral
      shell: bash
      run: npm install -g @stoplight/spectral-cli

    - name: 🎗️ Run Spectral Lint with DevOps Linter ruleset
      shell: bash
      continue-on-error: true
      run: |
        spectral lint \
          "${{ inputs.projectBaseDir }}/${{ inputs.openAPIFolder }}/*.json" \
          --format stylish \
          --format html \
          --output.html spectral-devops-linter.html \
          --ruleset https://raw.githubusercontent.com/connectedcircuits/devops-api-linter/main/rules.yaml

    - name: 🎗️ Run Spectral Lint with OWASP ruleset
      shell: bash
      continue-on-error: true
      run: |
        spectral lint \
          "${{ inputs.projectBaseDir }}/${{ inputs.openAPIFolder }}/*.json" \
          --format stylish \
          --format html \
          --output.html spectral-owasp.html \
          --ruleset https://unpkg.com/@stoplight/spectral-owasp-ruleset

    - name: 🎗️ 📤 Upload Spectral Lint Results
      if: ${{ always() }}
      uses: actions/upload-artifact@v4
      with:
        name: Spectral-Results
        path: spectral-*.html
