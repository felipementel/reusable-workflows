name: Docker Build and Push
description: Composite action to build and push Docker images to a container registry

inputs:
  registry:
    description: 'Container registry URL (e.g., ghcr.io, docker.io)'
    required: false
    default: 'ghcr.io'
  registry-username:
    description: 'Username for registry authentication'
    required: true
  registry-password:
    description: 'Password or token for registry authentication'
    required: true
  image-name:
    description: 'Docker image name (without registry prefix)'
    required: true
  tag-version:
    description: 'Version tag for the image'
    required: true
  dockerfile:
    description: 'Path to the Dockerfile'
    required: true
  context:
    description: 'Docker build context'
    required: false
    default: '.'
  platforms:
    description: 'Target platforms for build (comma-separated)'
    required: false
    default: 'linux/amd64,linux/arm64'
  push:
    description: 'Whether to push the image after build'
    required: false
    default: 'true'

runs:
  using: 'composite'
  steps:
    - name: 🐳 Set up QEMU
      uses: docker/setup-qemu-action@v3

    - name: 🐳 Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
      with:
        version: latest
        buildkitd-flags: --debug
        platforms: ${{ inputs.platforms }}

    - name: 🐳 Log in to the Container registry
      uses: docker/login-action@v3
      with:
        registry: ${{ inputs.registry }}
        username: ${{ inputs.registry-username }}
        password: ${{ inputs.registry-password }}

    - name: 🐳 Extract metadata (tags, labels) for Docker
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: |
          ${{ inputs.registry }}/${{ inputs.registry-username }}/${{ inputs.image-name }}

    - name: 🐳 Build and push
      uses: docker/build-push-action@v5
      with:
        context: ${{ inputs.context }}
        file: ${{ inputs.dockerfile }}
        push: ${{ inputs.push }}
        tags: |
          ${{ inputs.registry }}/${{ inputs.registry-username }}/${{ inputs.image-name }}:latest
          ${{ inputs.registry }}/${{ inputs.registry-username }}/${{ inputs.image-name }}:${{ inputs.tag-version }}
        labels: |
          ${{ steps.meta.outputs.labels }}

    - name: 📊 Summary
      shell: bash
      run: |
        echo "### 🐳 Docker Build and Push" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "- **Registry:** \`${{ inputs.registry }}\`" >> $GITHUB_STEP_SUMMARY
        echo "- **Image:** \`${{ inputs.registry }}/${{ inputs.registry-username }}/${{ inputs.image-name }}\`" >> $GITHUB_STEP_SUMMARY
        echo "- **Tags:** \`latest\`, \`${{ inputs.tag-version }}\`" >> $GITHUB_STEP_SUMMARY
        echo "- **Dockerfile:** \`${{ inputs.dockerfile }}\`" >> $GITHUB_STEP_SUMMARY
        echo "- **Platforms:** \`${{ inputs.platforms }}\`" >> $GITHUB_STEP_SUMMARY
