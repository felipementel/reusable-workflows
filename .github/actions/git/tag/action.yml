name: Check Tag Exists
description: Composite action to check if a git tag already exists in the remote repository

inputs:
  tag:
    description: 'Tag to check (without v prefix)'
    required: true
  version_file:
    description: 'File to update version (e.g., package.json, pyproject.toml, *.csproj)'
    required: true
  github-token:
    description: 'GitHub token with contents:write permission'
    required: true

outputs:
  TAG_EXISTS:
    description: "Whether the tag already exists (true/false)"
    value: ${{ steps.check-tag.outputs.TAG_EXISTS }}

env:
  # Colors for output
  RED: '\033[0;31m'
  GREEN: '\033[0;32m'
  RESET: '\033[0m'

runs:
  using: 'composite'
  steps:
    - name: 🔍 Check if tag already exists
      id: check-tag
      shell: bash
      run: |
        TAG="v${{ inputs.tag }}"
        if git ls-remote --tags origin "refs/tags/${TAG}" | grep -q "${TAG}"; then
          echo -e "❌ ${RED}A tag ${TAG} já existe no repositório remoto!${RESET}"
          echo -e "${RED}Atualize a versão no ${{ inputs.version_file }} antes de abrir o PR.${RESET}"
          echo "## ❌ Tag já existe" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "A tag \`${TAG}\` já existe. Atualize a versão no \`${{ inputs.version_file }}\`." >> $GITHUB_STEP_SUMMARY
          echo "TAG_EXISTS=true" >> "$GITHUB_OUTPUT"
        else
          echo -e "✅ ${GREEN}Tag ${TAG} disponível.${RESET}"
          echo "TAG_EXISTS=false" >> "$GITHUB_OUTPUT"
        fi

    - name: 🏷️ Create tag
      if: steps.check-tag.outputs.TAG_EXISTS == 'false'
      shell: bash
      env:
        GITHUB_TOKEN: ${{ inputs.github-token }}
      run: |
        TAG="v${{ inputs.tag }}"
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
        git tag "${TAG}"
        git push origin "${TAG}"
        echo -e "✅ ${GREEN}Tag ${TAG} criada e enviada com sucesso.${RESET}"
        echo "## ✅ Tag criada" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "A tag \`${TAG}\` foi criada e enviada para o repositório remoto." >> $GITHUB_STEP_SUMMARY

    - name: 🏷️ Notify tag exists
      if: steps.check-tag.outputs.TAG_EXISTS == 'true'
      shell: bash
      run: |
        TAG="v${{ inputs.tag }}"
        echo -e "⚠️ Tag ${TAG} já existe !!!"
        echo "## ⚠️ Tag já existe" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "A tag \`${TAG}\` já existe no repositório." >> $GITHUB_STEP_SUMMARY
