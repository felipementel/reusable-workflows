name: Git Leaks
description: Composite action to scan the repository for secrets using GitLeaks

inputs:
  github-token:
    description: 'GitHub token used by the GitLeaks action'
    required: true
  gitleaks-license:
    description: 'GitLeaks license key'
    required: true
  enable-summary:
    description: 'Enable GitLeaks summary output'
    required: false
    default: 'true'
  enable-upload-artifact:
    description: 'Enable GitLeaks artifact upload'
    required: false
    default: 'true'
  notify-user-list:
    description: 'Users to notify in GitLeaks output'
    required: false
    default: '@felipementel'

runs:
  using: 'composite'
  steps:
    - name: Prepare gitleaks tmp (self-hosted runner)
      shell: bash
      run: |
        GITLEAKS_TMP="${RUNNER_TEMP}/gitleaks"
        mkdir -p "$GITLEAKS_TMP"
        rm -f "$GITLEAKS_TMP"/gitleaks*.tmp
        echo "TMPDIR=$GITLEAKS_TMP" >> $GITHUB_ENV

    - name: 🧱📤 Git Leaks
      uses: gitleaks/gitleaks-action@v2
      env:
        GITHUB_TOKEN: ${{ inputs.github-token }}
        GITLEAKS_LICENSE: ${{ inputs.gitleaks-license }}
        GITLEAKS_ENABLE_SUMMARY: ${{ inputs.enable-summary }}
        GITLEAKS_ENABLE_UPLOAD_ARTIFACT: ${{ inputs.enable-upload-artifact }}
        GITLEAKS_NOTIFY_USER_LIST: ${{ inputs.notify-user-list }}
