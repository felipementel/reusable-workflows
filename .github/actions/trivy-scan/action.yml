name: Trivy Security Scan
description: Composite action to scan Docker images for vulnerabilities using Trivy

inputs:
  image-ref:
    description: 'Docker image reference to scan (e.g., ghcr.io/org/image:tag)'
    required: true
    default: ''
  severity:
    description: 'Severities to scan for (comma-separated)'
    required: false
    default: 'MEDIUM,HIGH,CRITICAL'
  format:
    description: 'Output format (sarif, json, table, github)'
    required: false
    default: 'github'
  output-file:
    description: 'Output file name'
    required: false
    default: 'trivy-results.sarif'
  upload-to-security:
    description: 'Upload results to GitHub Security tab'
    required: false
    default: 'true'
  scan-type:
    description: 'Type of scan (image, fs, license)'
    required: true
    default: ''
  trivyignores:
    description: 'Path to trivyignore file (e.g., .trivyignore.yaml). Leave empty to skip.'
    required: false
    default: ''
  exit-code:
    description: 'Exit code when vulnerabilities are found (0 or 1)'
    required: false
    default: '0'

outputs:
  scan-results:
    description: "Path to scan results file"
    value: ${{ steps.scan.outputs.output-file }}

runs:
  using: 'composite'
  steps:

    - name: 🔍 Scan with Trivy
      if: ${{ inputs.scan-type == 'image' }}
      id: scan
      uses: aquasecurity/trivy-action@0.35.0
      with:
        image-ref: ${{ inputs.image-ref }}
        format: ${{ inputs.format }}
        output: ${{ inputs.output-file }}
        severity: ${{ inputs.severity }}
        scan-type: ${{ inputs.scan-type }}
        ignore-unfixed: 'true'
        trivyignores: ${{ inputs.trivyignores }}
        exit-code: ${{ inputs.exit-code }}

    - name: 📤 Upload Trivy scan results to GitHub Security
      if: ${{ inputs.upload-to-security == 'true' && inputs.format == 'sarif' && always() }}
      uses: github/codeql-action/upload-sarif@v4
      continue-on-error: true
      with:
        sarif_file: ${{ inputs.output-file }}

    - name: 📦 Upload scan results as artifact
      if: ${{ always() && inputs.format == 'sarif' }}
      uses: actions/upload-artifact@v7
      continue-on-error: true
      with:
        name: trivy-scan-results
        path: ${{ inputs.output-file }}
        archive: false
        retention-days: 30

    - name: 📊 Summary
      shell: bash
      run: |
        echo "### 🔍 Trivy Security Scan" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "- **Image:** \`${{ inputs.image-ref }}\`" >> $GITHUB_STEP_SUMMARY
        echo "- **Severity:** \`${{ inputs.severity }}\`" >> $GITHUB_STEP_SUMMARY
        echo "- **Format:** \`${{ inputs.format }}\`" >> $GITHUB_STEP_SUMMARY
        echo "- **Output:** \`${{ inputs.output-file }}\`" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        if [ -f "${{ inputs.output-file }}" ]; then
          echo "✅ Scan completed successfully" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "📥 **View Results:**" >> $GITHUB_STEP_SUMMARY
          echo "- Check the workflow logs for detailed table output" >> $GITHUB_STEP_SUMMARY
          echo "- Download the \`trivy-scan-results\` artifact for SARIF format" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "> ℹ️ **Note:** Upload to GitHub Security tab requires Advanced Security to be enabled on private repositories." >> $GITHUB_STEP_SUMMARY
        else
          echo "⚠️ Scan results file not found" >> $GITHUB_STEP_SUMMARY
        fi
